      support_for_bike_index_services: L'assistenza per i servizi di Bike Index è
        attualmente disponibile solo in inglese, tramite e-mail.
      terms_of_service: Termini di servizio
      third_party_vendors: L'utente comprende che Bike Index si avvale di fornitori
        terzi e partner di hosting per fornire l'hardware, il software, la rete, lo
        storage e le tecnologie correlate necessari per il funzionamento del Servizio.
      we_claim_no_ip: Non rivendichiamo alcun diritto di proprietà intellettuale sul
        materiale che fornisci al Servizio. Il tuo profilo e i materiali caricati
        rimangono di tua proprietà. Tuttavia, i contenuti che carichi relativi alle
        tue biciclette possono essere visualizzati pubblicamente e, impostando il
        tuo profilo come pubblico, le informazioni che aggiungi saranno visibili a
        tutti. Accetti di consentire ad altri di visualizzare questi contenuti.
      we_dont_prescreen_content: Bike Index non effettua una pre-verifica dei Contenuti,
        ma Bike Index e i suoi incaricati hanno il diritto (ma non l'obbligo), a loro
        esclusiva discrezione, di rifiutare o rimuovere qualsiasi Contenuto disponibile
        tramite il Servizio.
      we_may_remove_content: Possiamo, ma non siamo obbligati a, rimuovere Contenuti
        e Account contenenti Contenuti che, a nostra esclusiva discrezione, riteniamo
        illegali, offensivi, minacciosi, calunniosi, diffamatori, pornografici, osceni
        o altrimenti discutibili, o che violino i diritti di proprietà intellettuale
        di terzi o i presenti Termini di servizio.
      welcome_to_bike_index_html: <strong>Benvenuti su Bike Index</strong> , un'organizzazione
        no-profit 501(c)(3). Abbiamo sviluppato un servizio di registrazione di biciclette
        accessibile al pubblico (il "Servizio") che vi permette di salvare e condividere
        le vostre biciclette su internet.
      you_agree_not_to_resell: Accetti di non vendere, rivendere o sfruttare alcuna
        parte del Servizio, l'utilizzo del Servizio o l'accesso al Servizio senza
        l'espressa autorizzazione scritta di Bike Index.
      you_are_responsible_for_content: L'utente è responsabile di tutti i contenuti
        pubblicati e di tutte le attività svolte tramite il proprio account (anche
        quando i contenuti vengono pubblicati da altri utenti che dispongono di account
        collegati al proprio account o che hanno accesso al proprio account).
      you_are_responsible_for_security: È tua responsabilità mantenere la sicurezza
        del tuo account e della tua password. Bike Index non può essere ritenuta responsabile
        per eventuali perdite o danni derivanti dalla tua mancata osservanza di questo
        obbligo di sicurezza.
      you_may_not_use_for_illegal: Non è consentito utilizzare il Servizio per scopi
        illegali o non autorizzati. Nell'utilizzo del Servizio, non è consentito violare
        alcuna legge vigente nella propria giurisdizione (incluse, a titolo esemplificativo,
        le leggi sul diritto d'autore o sui marchi).
      you_must_be_human: Devi essere una persona fisica. Gli account registrati da
        "bot" o altri metodi automatizzati non sono consentiti.
      you_must_notify: Non è consentito modificare, adattare o manomettere il Servizio
        né modificare un altro sito web in modo da far credere falsamente che sia
        associato al Servizio, a Bike Index o a qualsiasi altro servizio di Bike Index.
      you_must_provide_email: Per completare la procedura di registrazione è necessario
        fornire un indirizzo email valido.
      you_shall_defend_bike_index: L'utente si impegna a difendere Bike Index da qualsiasi
        reclamo, richiesta, causa o procedimento intentato contro Bike Index da terzi
        che sostengano che i Contenuti dell'utente, o il suo utilizzo del Servizio
        in violazione del presente Contratto, violino o si appropriino indebitamente
        dei diritti di proprietà intellettuale di terzi o violino la legge applicabile,
        e si impegna a indennizzare Bike Index per qualsiasi danno definitivamente
        riconosciuto a carico di Bike Index e per le ragionevoli spese legali sostenute
        da Bike Index in relazione a qualsiasi reclamo, richiesta, causa o procedimento;
        a condizione che Bike Index (a) fornisca tempestivamente all'utente una notifica
        scritta del reclamo, della richiesta, della causa o del procedimento; (b)
        conceda all'utente il controllo esclusivo della difesa e della transazione
        del reclamo, della richiesta, della causa o del procedimento (a condizione
        che l'utente non possa transigere alcun reclamo, richiesta, causa o procedimento
        a meno che la transazione non liberi incondizionatamente Bike Index da ogni
        responsabilità); e (c) fornisca all'utente tutta l'assistenza ragionevole,
        a spese dell'utente.
      your_use_of_the_service: L'utilizzo del Servizio è a vostro esclusivo rischio.
        Il servizio viene fornito "così com'è" e "secondo disponibilità".
    vendor_terms_text:
      about_terms_of_service_for_vendors: Informazioni sui nostri termini di servizio
        per i fornitori
      available_here: disponibile qui
      because_bike_index_html: 'Poiché Bike Index si basa sulla collaborazione con
        organizzazioni ciclistiche, potremmo dover verificare il tuo status di organizzazione
        ciclistica. Ci fornisci informazioni di base sulla tua organizzazione e noi
        cercheremo di verificarle (potremmo collaborare con terze parti a questo scopo)
        e approveremo il tuo account fornitore, a meno che non venga ritenuto rischioso
        (da noi o dai nostri partner). Ci autorizzi a fare tutto ciò e ad aggiornare
        periodicamente le informazioni; in caso contrario, saremo costretti a rifiutarci
        di offrirti il Servizio. <a href="#section_c">Dettagli completi</a>

        '
      becoming_a_vendor: Diventare un venditore su Bike Index
      bike_index_vendor_service: Servizio di vendita Bike Index
      bike_index_vendor_tos: Termini di servizio del fornitore Bike Index
      binding_arbitration: Arbitrato vincolante
      binding_arbitration_p1: Qualsiasi controversia o reclamo derivante da o relativo
        alle presenti Condizioni di servizio, o a qualsiasi violazione delle stesse,
        sarà risolto mediante arbitrato amministrato dall'American Arbitration Association
        in conformità con il suo Regolamento di arbitrato commerciale e la sentenza
        arbitrale emessa dall'arbitro o dagli arbitri potrà essere depositata presso
        qualsiasi tribunale competente.
      by_giving_bike_shop_employees_html: 'Offrendo ai dipendenti dei negozi di biciclette
        e alle organizzazioni di promozione della mobilità ciclistica (i Fornitori)
        la possibilità di aggiungere gratuitamente le biciclette al Servizio, miriamo
        a incentivare la registrazione e a contrastare la procrastinazione in merito.
        Abbiamo inoltre sviluppato un''integrazione con Lightspeed che consente ai
        negozi che utilizzano Lightspeed come sistema di punto vendita di registrare
        le biciclette immediatamente dopo la vendita. Approfondiremo questo aspetto
        più avanti in questo documento. Se avete domande, dubbi o desiderate semplicemente
        comprendere meglio il nostro funzionamento in Bike Index, non esitate a contattarci.

        '
      customer_service: Assistenza clienti
      customer_service_body: Vi forniremo assistenza clienti per risolvere qualsiasi
        problema relativo al vostro account Bike Index, alla registrazione delle biciclette
        tramite il nostro servizio e all'utilizzo del nostro software.
      disclosures_and_notices: Informativa e comunicazioni
      disclosures_and_notices_p1: Accetti che Bike Index possa fornirti informazioni
        e avvisi relativi al Servizio pubblicandoli sul nostro sito web, inviandoli
        via e-mail all'indirizzo e-mail indicato nel tuo account Bike Index o inviandoli
        per posta all'indirizzo indicato nel tuo account fornitore Bike Index. Accetti
        inoltre che le informazioni e gli avvisi inviati in formato elettronico abbiano
        lo stesso significato ed effetto di una copia cartacea. Tali informazioni
        e avvisi si considereranno ricevuti entro 24 ore dalla pubblicazione sul nostro
        sito web o dall'invio tramite e-mail, a meno che non riceviamo notifica di
        mancata consegna dell'e-mail.
      effects_of_deactivation: Effetti della disattivazione
      effects_of_deactivation_p1: Una volta disattivato il tuo account fornitore Bike
        Index, la tua possibilità di aggiungere biciclette tramite il Servizio verrà
        immediatamente interrotta. Potrai comunque accedere al resto del servizio.
      effects_of_termination: Effetti della cessazione del rapporto di lavoro
      effects_of_termination_p1: Al momento della chiusura del tuo account Bike Index,
        interromperemo immediatamente il tuo accesso al Servizio Fornitori. Accetti
        di non accettare più nuove registrazioni tramite il Servizio. Non ti verrà
        rimborsato l'importo residuo delle commissioni pagate per il Servizio qualora
        il tuo accesso o utilizzo del Servizio venga interrotto o sospeso. Tutti i
        fondi in nostro possesso saranno trattenuti da Bike Index.
      effects_of_termination_p2: 'In caso di cessazione, l''utente accetta di: (i)
        interrompere immediatamente l''utilizzo del Servizio; (ii) interrompere l''utilizzo
        di qualsiasi marchio Bike Index e rimuovere immediatamente qualsiasi riferimento
        e logo Bike Index dalla propria attività; (iii) continuare ad essere vincolato
        dal presente Contratto; (iv) che la licenza concessa ai sensi del presente
        Contratto cesserà; (v) che ci riserviamo il diritto (ma non abbiamo l''obbligo)
        di eliminare tutte le informazioni e i dati dell''account dell''utente memorizzati
        sui nostri server; e (e) che non saremo responsabili nei confronti dell''utente
        per alcun risarcimento, rimborso o danno in relazione all''utilizzo del Servizio
        da parte dell''utente, o a qualsiasi cessazione o sospensione del Servizio
        o eliminazione delle informazioni o dei dati dell''account dell''utente.'
      governing_law: Legge applicabile
      governing_law_p1: Le presenti Condizioni di Servizio per i Fornitori saranno
        interpretate e applicate in conformità alle leggi dello Stato dell'Illinois.
        Tutte le parti acconsentono alla giurisdizione personale e al foro competente
        di qualsiasi tribunale situato nella Contea di Cook, Illinois, e ciascuna
        rinuncia a qualsiasi obiezione basata su incompetenza territoriale, incompetenza
        territoriale, inconvenienza del foro giudiziario o qualsiasi altro motivo.
      illegal_use: Sospetto di utilizzo non autorizzato o illegale
      illegal_use_p1: Ci riserviamo il diritto di non autorizzare o non liquidare
        alcuna transazione da te inviata che riteniamo violi il presente Contratto,
        qualsiasi altro accordo di Bike Index, o che esponga te, altri utenti di Bike
        Index, i nostri processori o Bike Index a danni, inclusi, a titolo esemplificativo
        ma non esaustivo, frodi e altri atti criminali. Con il presente documento
        ci autorizzi a condividere con le forze dell'ordine informazioni su di te,
        sulle tue transazioni o sul tuo account di servizio Bike Index qualora dovessimo
        ragionevolmente sospettare che il tuo utilizzo di Bike Index sia stato effettuato
        per scopi non autorizzati, illegali o criminali.
      last_updated_html: Ultimo aggiornamento 29 luglio 2017. Versioni precedenti
        e cronologia delle modifiche sono %{link}.
      license_trademarks: La tua licenza; i nostri marchi
      license_trademarks_p1: Bike Index concede all'utente una licenza personale,
        limitata, non esclusiva, revocabile e non trasferibile, senza diritto di sublicenza,
        per accedere e utilizzare il Servizio in via elettronica esclusivamente per
        registrarsi, gestire i dati relativi alle biciclette create dall'utente e
        contattare i proprietari di biciclette rubate qualora l'utente le trovi. Il
        Servizio comprende il nostro sito web, qualsiasi software, programma, documentazione,
        strumento, servizio basato su Internet, componente e qualsiasi aggiornamento
        (inclusi manutenzione del software, informazioni di servizio, contenuti di
        aiuto, correzioni di bug o versioni di manutenzione) fornito all'utente da
        Bike Index. L'utente avrà il diritto di scaricare gli aggiornamenti del Servizio,
        soggetti a eventuali termini aggiuntivi che gli verranno comunicati al momento
        della loro pubblicazione da parte di Bike Index.
      license_trademarks_p2: Periodicamente potremmo anche rendere disponibili alcuni
        loghi, marchi o altri elementi identificativi di Bike Index per il vostro
        utilizzo. Non siete obbligati a utilizzarli e potete usarli nel modo che preferite.
      lightspeed_integration: Integrazione Lightspeed
      lightspeed_integration_p1: Per registrare la bicicletta di un cliente direttamente
        dal tuo negozio, devi raccogliere il numero di serie della bicicletta e l'indirizzo
        e-mail del cliente. Se il tuo negozio utilizza Lightspeed Retail e l'integrazione
        Bike Index con Lightspeed, Lightspeed raccoglierà e ci invierà tutte le informazioni
        presenti in Lightspeed al momento della vendita. Queste informazioni potrebbero
        includere, a titolo esemplificativo, il numero di telefono del cliente, l'indirizzo
        del cliente, il colore e la taglia della bicicletta. Noi raccogliamo solo
        le informazioni necessarie per registrare correttamente la bicicletta per
        il tuo cliente.
      lightspeed_integration_p2: Ci impegniamo a mantenere riservate le informazioni
        dei clienti. Non memorizziamo alcuna informazione trasmessa da Lightspeed,
        ad eccezione di quelle necessarie per la registrazione a Bike Index. Tutte
        le comunicazioni tra Lightspeed e il nostro Servizio sono crittografate e
        soggette ai nostri Termini e Condizioni e ai termini e accordi applicabili
        stabiliti da Lightspeed.
