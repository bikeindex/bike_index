  landing_pages:
    ambassadors_current:
      after_a_couple_of_recoveries_i_got_hooked: Dopo un paio di recuperi, mi sono
        appassionato. È stato davvero bello poter restituire alcune di queste biciclette
        a persone che le amano veramente.
      anytown_earth: Qualsiasi città, la terra
      as_the_founder_of_bicycle_security_adviso: In qualità di fondatore di Bicycle
        Security Advisors, la cui missione è fornire alle comunità le migliori informazioni
        su come parcheggiare le biciclette in sicurezza e proteggerle dai furti, posso
        affermare che Bike Index è senza dubbio il registro più efficace che si possa
        utilizzare.
      become_a_bike_index_ambassador_and_help_s: Diventa ambasciatore di Bike Index
        e aiuta le biciclette rubate a tornare a casa.
      bike_index_allows_us_to_verify_details_ab: Bike Index ci permette di verificare
        i dettagli relativi alla bicicletta, i dettagli del furto, il numero di pratica
        della polizia e le informazioni di contatto del proprietario. Possiamo anche
        condividere il registro direttamente con le forze dell'ordine per accelerare
        il processo di recupero.
      bike_index_helped_me_recover_my_beloved_b: Bike Index mi ha aiutato a recuperare
