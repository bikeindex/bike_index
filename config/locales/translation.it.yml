        requisiti specifici, (ii) il servizio sarà ininterrotto, tempestivo, sicuro
        o privo di errori, (iii) i risultati che potrebbero essere ottenuti dall'utilizzo
        del servizio saranno accurati o affidabili, (iv) la qualità di qualsiasi prodotto,
        servizio, informazione o altro materiale acquistato o ottenuto da te tramite
        il servizio soddisferà le tue aspettative e (v) eventuali errori nel Servizio
        saranno corretti.
      bike_index_reserves: Bike Index si riserva il diritto, in qualsiasi momento
        e di volta in volta, di modificare o interrompere, temporaneamente o permanentemente,
        il Servizio (o qualsiasi parte di esso) con o senza preavviso.
      bike_index_shall_not_be_liable: Bike Index non sarà responsabile nei vostri
        confronti o nei confronti di terzi per qualsiasi modifica, sospensione o interruzione
        del Servizio.
      by_creating_account: Creando un "Account" e utilizzando il sito web BikeIndex.org
        ("Servizio") o qualsiasi servizio di Bike Index, NFP ("Bike Index"), l'utente
        accetta di essere vincolato dai seguenti termini e condizioni ("Termini di
        Servizio"). SE L'UTENTE STIPULA IL PRESENTE CONTRATTO PER CONTO DI UNA SOCIETÀ
        O DI UN'ALTRA PERSONA GIURIDICA, DICHIARA DI AVERE L'AUTORITÀ DI VINCOLARE
        TALE SOCIETÀ, LE SUE AFFILIATE E TUTTI GLI UTENTI CHE ACCEDONO AI NOSTRI SERVIZI
        TRAMITE IL SUO ACCOUNT AI PRESENTI TERMINI E CONDIZIONI, NEL QUAL CASO I TERMINI
        "TU" O "TUO" SI RIFERIRANNO A TALE SOCIETÀ, ALLE SUE AFFILIATE E AGLI UTENTI
        AD ESSA ASSOCIATI. SE NON SI POSSIEDE TALE AUTORITÀ O SE NON SI ACCETTANO
        I PRESENTI TERMINI E CONDIZIONI, NON È NECESSARIO ACCETTARE IL PRESENTE CONTRATTO
        E NON È POSSIBILE UTILIZZARE I SERVIZI.
      by_giving_bike_shops_html: Offrendo ai negozi di biciclette, alle organizzazioni
        ciclistiche e ai dipartimenti di polizia la possibilità di registrare direttamente
        le biciclette dei loro utenti, miriamo a incentivare la registrazione delle
        biciclette, a sostenere la cultura ciclistica locale e a garantire registrazioni
        accurate. Abbiamo cercato di redigere questi Termini di servizio nel modo
        più semplice e comprensibile possibile. Purtroppo, la realtà del mondo legale
        rende questo compito molto difficile. Pertanto, se avete domande o dubbi,
        o semplicemente desiderate comprendere meglio come operiamo in Bike Index,
        non esitate a contattarci.
      content_on_the_service: Per "Contenuto" sul Servizio si intende qualsiasi informazione
        inserita dagli Utenti nel servizio stesso. Per Utenti si intendono coloro
        che utilizzano il Servizio Bike Index e accettano i Termini di Servizio. Sebbene
        Bike Index vieti alcuni comportamenti e Contenuti sul Servizio, l'utente comprende
        e accetta che Bike Index non può essere ritenuta responsabile per i Contenuti
        pubblicati sul Servizio e che, ciononostante, l'utente potrebbe essere esposto
        a tali materiali. L'utente accetta di utilizzare il Servizio a proprio rischio.
        La violazione di uno qualsiasi dei termini seguenti comporterà la chiusura
        dell'Account.
      if_bike_index_html: 'Qualora Bike Index apporti modifiche sostanziali ai presenti
        Termini, ti informeremo tramite e-mail o pubblicando un avviso sul nostro
        sito prima che le modifiche entrino in vigore. Qualsiasi nuova funzionalità
        che integri o migliori il Servizio attuale, incluso il rilascio di nuovi strumenti
        e risorse, sarà soggetta ai Termini di servizio. L''utilizzo continuato del
        Servizio dopo tali modifiche costituirà il tuo consenso alle stesse. Puoi
        consultare la versione più recente dei Termini di servizio in qualsiasi momento
        al seguente indirizzo: %{terms_link}.'
      last_updated_html: Ultimo aggiornamento 29 luglio 2017. Versioni precedenti
        e cronologia delle modifiche sono %{link}.
      may_be_terminated: L'utente comprende che l'elaborazione e la trasmissione tecnica
        del Servizio, compresi i Contenuti dell'utente, possono essere trasferite
        senza crittografia e comportare (a) trasmissioni su diverse reti; e (b) modifiche
        per conformarsi e adattarsi ai requisiti tecnici delle reti o dei dispositivi
        di connessione.
      no_abuse: Qualsiasi forma di abuso verbale, fisico, scritto o di altro tipo
        (incluse minacce di abuso o ritorsione) nei confronti di un cliente, dipendente,
        membro o dirigente di Bike Index comporterà l'immediata chiusura dell'account.
      no_spam: È vietato caricare, pubblicare, ospitare o trasmettere e-mail, SMS
        o messaggi "spam" non richiesti.
      no_waiver: Il mancato esercizio o la mancata applicazione da parte di Bike Index
        di qualsiasi diritto o disposizione delle Condizioni di Servizio non costituirà
        una rinuncia a tale diritto o disposizione. Le Condizioni di Servizio costituiscono
        l'intero accordo tra l'utente e Bike Index e regolano l'utilizzo del Servizio,
        sostituendo qualsiasi accordo precedente tra l'utente e Bike Index (incluse,
        a titolo esemplificativo, le versioni precedenti delle Condizioni di Servizio).
        L'utente accetta che le presenti Condizioni di Servizio e il suo utilizzo
        del Servizio siano regolati dalla legge dell'Illinois.
      questions_html: Le domande relative ai Termini di servizio devono essere inviate
        a %{contact_email_link}.
      section_a_header: 'Sezione A: Riconoscimento e accettazione dei termini da parte
        dell''utente'
      section_b_header: 'Sezione B: Termini dell''account'
      section_c_header: 'Sezione C: Modifiche al servizio'
      section_d_header: 'Sezione D: Diritto d''autore e proprietà dei contenuti'
