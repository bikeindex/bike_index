    faq:
      absolutely: Assolutamente!
      add_a_stolen_bike_link: Aggiungi la tua bici rubata a Bike Index!
      add_details: Aggiungi subito la bicicletta e i dettagli del furto all'indice!
      article_link: il nostro articolo
      bike_index_is_that_resource: Bike Index è proprio quella risorsa. La prossima
        volta che acquisti una bicicletta usata, consulta prima l'Index.
      bike_serial_number: Numero di serie della bicicletta
      bike_was_already_stolen: Mi hanno già rubato la bicicletta. Cosa devo fare?
      bikes_are_public_and_searchable: Le biciclette sono pubbliche e ricercabili,
        ma non sono visibili informazioni sul proprietario. È possibile scegliere
        di condividere informazioni (come il proprio account Twitter o il sito web
        personale), ma questa opzione è disattivata per impostazione predefinita.
      blog_link: blog
      can_partner_with_bikeindex: Il mio negozio di biciclette di zona può collaborare
        con Bike Index?
      can_thieves_search: È possibile per i ladri di biciclette consultare Index per
        verificare se una bicicletta risulta rubata prima di venderla?
      can_you_tell_me_what_bike_by_serial: Sapresti dirmi che modello di bicicletta
        possiedo in base al numero di serie?
      comprehensive_public_database: 'Bike Index è un database pubblico completo:
        se la tua bicicletta è stata rubata, riteniamo che tutti debbano saperlo.'
      email_us_html: Invia un'e-mail a %{email_link} per saperne di più!
      everyone_can_register_bikes_for_free: Chiunque può registrare la propria bicicletta,
        gratuitamente.
      faqs: Problemi comuni e domande frequenti
      follow_us_html: Potete seguirci anche su %{twitter_link} e %{facebook_link}.
      free_to_transfer: L'immatricolazione della bicicletta è permanente e il trasferimento
        di proprietà è gratuito.
      go_to_edit_page: Vai alla pagina di modifica della moto e seleziona la pagina
        "Trasferimento di proprietà".
      how_bikes_are_verified: Come si verifica l'autenticità delle biciclette registrate
        dagli utenti?
      how_can_i_advertise: Come posso pubblicizzare su Bike Index?
      how_can_i_stay_up_to_date: Come posso rimanere aggiornato sulle attività di
        Bike Index?
      how_does_this_prevent_bike_theft: In che modo questo previene il furto di biciclette?
      in_the_process_of_setting_up_advertising: Stiamo predisponendo diverse opportunità
        pubblicitarie sul sito, in particolare per i negozi di biciclette locali.
      not_yet: No. Stiamo lavorando a questa funzionalità, ma non è ancora pronta.
      organization_signup_html: Invitateli a visitare il sito %{signup_link}, creeremo
        per loro un account aziendale in modo che possano registrare le biciclette
        gratuitamente.
      organization_signup_link: pagina di registrazione dell'organizzazione
      other_registries_html: Altri registri generalmente nascondono i numeri di serie
        a causa delle loro limitazioni tecniche. Tengono le informazioni lontane da
        coloro che potrebbero utilizzarle correttamente, anche se %{wikipedia_link}
        non funziona.
      partner_link: uno dei nostri negozi partner
      people_with_good_intentions: Attualmente, persone con buone intenzioni acquistano
        biciclette rubate perché non esiste una risorsa semplice e facilmente consultabile
        per verificare l'autenticità di una bicicletta prima dell'acquisto.
      possible_but_uncommon: È possibile, ma non comune. Monitoriamo e segnaliamo
        le attività sospette per prevenire abusi di Bike Index.
      read_our_blog_html: Leggi il nostro %{blog_link}! Pubblichiamo lì la maggior
        parte delle cose interessanti che facciamo.
      registration_html: La registrazione della tua bicicletta su %{partner_link}
        ne verifica l'avvenuta registrazione (i negozi possono scegliere di registrare
        solo le biciclette che vendono).
      reveal_owner_email_html: Inserisci l'indirizzo email del nuovo proprietario
        e salva le modifiche! Potrai comunque modificare la bici finché il nuovo proprietario
        non la reclamerà.
      security_by_obscurity_link: sicurezza tramite l'oscurità
      serial_numbers_public: Rendiamo pubblici i numeri di serie perché è il modo
        migliore per recuperare le biciclette rubate e scoraggiare i furti.
      similar_serials: Se ci sono altre biciclette con numeri di serie simili, soprattutto
        se differiscono solo le ultime cifre, è molto probabile che la tua bicicletta
        sia di quella marca e modello.
      the_faster_and_easier_it_is: Più è facile e veloce accedere ai numeri di serie,
        più biciclette rubate riusciamo a recuperare. Limitare l'accesso ai numeri
        di serie non fa altro che favorire i ladri.
      this_isnt_optimistic_speculation: 'Non si tratta di speculazioni ottimistiche:
        lo abbiamo dimostrato e continuiamo a farlo con ogni bicicletta rubata che
        recuperiamo.'
      to_learn_more_html: Per saperne di più, consulta %{article_link} sulla privacy.
      verification_questions: Qualsiasi questione di verifica viene risolta esaminando
        le informazioni di registrazione. Finora non si sono verificati problemi.
      visit_or_add_html: Innanzitutto, %{add_link}. Una volta fatto ciò, ti mostreremo
        una lista di controllo su cosa fare per migliorare le tue possibilità di recupero.
      we_care_about_your_privacy: 'La tua privacy è la nostra priorità assoluta: puoi
        nascondere la tua registrazione in modo che solo tu possa vederla. Semplicemente,
        non la riteniamo una buona idea.'
      we_offer_bike_shops: Offriamo ai negozi di biciclette e alle forze dell'ordine
        un'interfaccia facile da usare per cercare qualsiasi bicicletta sospetta che
        incontrano e un modo per contattare rapidamente il legittimo proprietario.
      we_recommend_searching: Per ora, ti consigliamo di cercare il numero di serie
        della tua bicicletta. Ti mostreremo tutte le biciclette registrate che hanno
        un numero di serie simile.
      we_successfully_recover: Grazie a questa procedura, riusciamo a recuperare con
        successo biciclette rubate ogni settimana.
      weve_recovered_bikes: Abbiamo recuperato biciclette prima ancora che venissero
        segnalate come rubate, perché erano già presenti nell'indice.
      what_about_my_privacy: E la mia privacy?
      what_if_i_sell_my_bike: E se vendessi la mia bicicletta?
      while_serial_numbers: Sebbene i numeri di serie e le informazioni sulle biciclette
        siano pubblici, non esiste alcun collegamento tra gli utenti e le biciclette
        di loro proprietà. Non rendiamo mai disponibili le informazioni degli utenti
        a meno che questi non scelgano esplicitamente di farlo.
      who_can_register_bikes: Chi può immatricolare le biciclette?
      why_public: Perché i numeri di serie e le informazioni sulle biciclette non
        rubate sono di dominio pubblico?
      your_personal_information_is_never_viewed: Le tue informazioni personali non
        vengono mai visualizzate, condivise o vendute senza il tuo consenso.
