        in materia di esportazione e importazione. Salvo diversa indicazione esplicita,
        tutti i materiali presenti sul Servizio sono destinati esclusivamente a persone
        fisiche, aziende o altre entità con sede negli Stati Uniti.
      no_warranties: Nessuna garanzia
      no_warranties_p1: IL SERVIZIO E TUTTA LA DOCUMENTAZIONE ALLEGATA SONO FORNITI
        "COSÌ COME SONO" E "COME DISPONIBILI", SENZA ALCUNA GARANZIA, ESPLICITA, IMPLICITA
        O DI LEGGE, INCLUSE, A TITOLO ESEMPLIFICATIVO, LE GARANZIE IMPLICITE DI TITOLO,
        COMMERCIABILITÀ, IDONEITÀ PER UNO SCOPO PARTICOLARE E NON VIOLAZIONE DEI DIRITTI
        DI TERZI. L'UTILIZZO DEL SERVIZIO È A VOSTRO ESCLUSIVO RISCHIO.
      no_warranties_p2: NESSUN CONSIGLIO O INFORMAZIONE, SIA ORALE CHE SCRITTA, OTTENUTA
        DALL'UTENTE DA O ATTRAVERSO IL SERVIZIO O DA (I) BIKE INDEX; O (II) QUALSIASI
        DELLE RISPETTIVE AFFILIATE, AGENTI, DIRETTORI E DIPENDENTI DI UNA QUALSIASI
        DELLE ENTITÀ ELENCATE IN (I) SOPRA (COLLETTIVAMENTE, LE "ENTITÀ ESCLUDENDO
        GARANZIE" E INDIVIDUALMENTE UNA "ENTITÀ ESCLUDENDO GARANZIE"), CREERÀ ALCUNA
        GARANZIA. L'UTENTE RICONOSCE ESPRESSAMENTE CHE BIKE INDEX NON PUÒ GARANTIRE
        CHE I SUOI CLIENTI COMPLETERANNO UNA REGISTRAZIONE O SIANO AUTORIZZATI A FARLO.
      no_warranties_p3: SENZA LIMITARE QUANTO PRECEDE, LE ENTITÀ CHE ESCLUDONO GARANZIE
        NON GARANTISCONO CHE LE INFORMAZIONI DA LORO FORNITE O FORNITE ATTRAVERSO
        IL SERVIZIO SIANO ACCURATE, AFFIDABILI O CORRETTE; CHE IL SERVIZIO SODDISFERÀ
        LE VOSTRE ESIGENZE; CHE IL SERVIZIO SARÀ DISPONIBILE IN QUALSIASI MOMENTO
        O LUOGO SPECIFICO; CHE IL SERVIZIO FUNZIONERÀ IN MODO ININTERROTTO O SARÀ
        SICURO; CHE EVENTUALI DIFETTI O ERRORI VERRANNO CORRETTI; O CHE IL SERVIZIO
        SIA PRIVO DI VIRUS O ALTRI COMPONENTI DANNOSI. QUALSIASI CONTENUTO SCARICATO
        O ALTRIMENTI OTTENUTO ATTRAVERSO L'UTILIZZO DEL SERVIZIO VIENE SCARICATO A
        VOSTRO ESCLUSIVO RISCHIO E SARETE GLI UNICI RESPONSABILI DI QUALSIASI DANNO
        ALLA VOSTRA PROPRIETÀ O PERDITA DI DATI DERIVANTE DA TALE DOWNLOAD. LE ENTITÀ
        CHE ESCLUDONO OGNI RESPONSABILITÀ NON FORNISCONO ALCUNA DICHIARAZIONE O GARANZIA
        IN MERITO AI TEMPI NECESSARI PER IL COMPLETAMENTO DELL'ELABORAZIONE DI UNA
        TRANSAZIONE.
      no_warranties_p4: LE ENTITÀ ESCLUDENTI NON GARANTISCONO, APPROVANO, ASSICURANO
        O SI ASSUMONO ALCUNA RESPONSABILITÀ PER QUALSIASI PRODOTTO O SERVIZIO PUBBLICIZZATO
        O OFFERTO DA TERZI ATTRAVERSO IL SERVIZIO O QUALSIASI SITO WEB O SERVIZIO
        COLLEGATO TRAMITE HYPERLINK, O PRESENTATO IN QUALSIASI BANNER O ALTRA FORMA
        DI PUBBLICITÀ, E BIKE INDEX NON SARÀ PARTE DI NESSUNA TRANSAZIONE TRA L'UTENTE
        E I FORNITORI TERZI DI PRODOTTI O SERVIZI, NÉ MONITORERÀ IN ALCUN MODO QUESTA
        TRANSAZIONE.
      our_role: Il nostro ruolo
      our_role_body: Il nostro servizio ti aiuta a registrare le biciclette per i
        tuoi clienti in modo semplice e veloce, e offre ai clienti la possibilità
        di modificare la maggior parte delle informazioni relative alle loro registrazioni.
        Per utilizzare il servizio di vendita Bike Index, è necessario registrarsi
        a Bike Index (vedi la sezione "Diventare un venditore Bike Index"). Inoltre,
        non ci assumiamo alcuna responsabilità per biciclette, tricicli o altri tipi
        di veicoli (collettivamente "Biciclette") registrati tramite il nostro servizio.
      ownership: Proprietà
      ownership_p1: Il Servizio è concesso in licenza e non venduto. Ci riserviamo
        tutti i diritti non espressamente concessi all'utente nel presente Contratto.
        Il Servizio è protetto da copyright, segreti commerciali e altre leggi sulla
        proprietà intellettuale. Siamo titolari del titolo, del copyright e di altri
        diritti di proprietà intellettuale a livello mondiale (come definiti di seguito)
        relativi al Servizio e a tutte le copie del Servizio. Il presente Contratto
        non concede all'utente alcun diritto sui nostri marchi commerciali o marchi
        di servizio.
      ownership_p2: Ai fini del presente Accordo, per "Diritti di Proprietà Intellettuale"
        si intendono tutti i diritti di brevetto, i diritti d'autore, i diritti sui
        disegni di circuiti integrati, i diritti morali, i diritti di pubblicità,
        i diritti sui marchi commerciali, sull'immagine aziendale e sui marchi di
        servizio, l'avviamento, i diritti sui segreti commerciali e altri diritti
        di proprietà intellettuale che possano esistere ora o in futuro, nonché tutte
        le relative domande di registrazione, registrazioni, rinnovi ed estensioni,
        ai sensi delle leggi di qualsiasi stato, paese, territorio o altra giurisdizione.
      ownership_p3: Potresti scegliere di inviarci commenti o idee sul Servizio, inclusi,
        a titolo esemplificativo, suggerimenti per migliorare il Servizio o i nostri
        prodotti ("Idee"), oppure potremmo invitarti a farlo. Inviando un'Idea, accetti
        che la tua comunicazione sia gratuita, non richiesta e senza restrizioni e
        che non imponga a Bike Index alcun obbligo fiduciario o di altro tipo, e che
        siamo liberi di utilizzare l'Idea senza alcun compenso aggiuntivo per te e/o
        di divulgarla a chiunque, anche senza vincoli di riservatezza. Riconosci inoltre
        che, accettando la tua proposta, Bike Index non rinuncia ad alcun diritto
        di utilizzare idee simili o correlate già note a Bike Index, sviluppate dai
        suoi dipendenti o ottenute da fonti diverse da te.
      privacy_of_others: Privacy degli altri
      privacy_of_others_p1_html: Dichiari a Bike Index di essere in regola con tutte
        le leggi sulla privacy applicabili, di aver ottenuto tutti i diritti e i consensi
        necessari ai sensi della legge applicabile per divulgare a Bike Index, o consentire
        a Bike Index di raccogliere, utilizzare, conservare e divulgare qualsiasi
        dato del Cliente che ci fornisci o che ci autorizzi a raccogliere. Sei l'unico
        responsabile di informare i tuoi Clienti che l'accesso al nostro servizio
        richiederà la loro accettazione dei nostri <a href="https://bikeindex.org/terms">Termini
        di servizio</a> e <a href="https://bikeindex.org/privacy">dell'Informativa
        sulla privacy.</a>
      privacy_of_others_p2_html: Se ricevi informazioni su altri utenti, inclusi gli
        utenti di Bike Index, tramite l'utilizzo del Servizio, devi mantenerle riservate
        e utilizzarle esclusivamente in relazione al Servizio. Non puoi divulgare
        o distribuire tali informazioni a terzi né utilizzarle per scopi di marketing,
        a meno che tu non abbia ottenuto il consenso esplicito dell'utente.
      privacy_of_others_p3_html: Non venderemo, scambieremo o divulgheremo in alcun
        modo le informazioni relative ai vostri clienti. Qualora Bike Index venisse
        acquisita da un'altra organizzazione, informeremo tutti gli utenti tramite
        l'indirizzo e-mail principale registrato che i loro dati verranno trasferiti
        e potrebbero essere soggetti a una diversa politica sulla privacy.
      privacy_of_others_p4_html: I dati dei clienti che hai raccolto prima di questa
        partnership, ma che desideri che Bike Index integri nel Servizio, saranno
        protetti da tutte le condizioni elencate nel presente Accordo.
      prohibited_businesses: Attività vietate
      prohibited_businesses_p1: 'Registrandoti al servizio Bike Index Vendor, confermi
        di non utilizzare il servizio per registrare biciclette in relazione alle
        seguenti attività commerciali o pratiche commerciali: (1) vendita consapevole
        di biciclette rubate, (2) furto di biciclette.'
      prohibited_businesses_p2: Accettando il presente Accordo, confermi di soddisfare
        questi requisiti.
      references_to_relationship: Riferimenti alla nostra relazione
      references_to_relationship_p1: Accetti che, dal momento in cui accetti il presente
        Contratto con Bike Index fino alla chiusura del tuo account, possiamo identificarti
        come Fornitore di Bike Index. Né tu né noi insinueremo alcuna sponsorizzazione,
        approvazione o affiliazione non veritiera tra te e Bike Index. Ci autorizzi
        a pubblicare sul nostro sito web informazioni relative alla tua attività,
        incluse, a titolo esemplificativo, il nome, la sede e il numero di telefono.
      representation_and_warranties: Dichiarazioni e garanzie
      representation_and_warranties_p1: 'Dichiari e garantisci a noi che: (a) sei
        una persona fisica di almeno diciotto (18) anni di età o, se hai meno di diciotto
        (18) anni di età, hai ottenuto il consenso dei tuoi genitori o tutori legali
        per la stipula del presente Contratto e l''utilizzo dei Servizi per i Fornitori
        di Bike Index nel modo prescritto da Bike Index; (b) sei idoneo a registrarti
        e utilizzare il Servizio e hai il diritto, il potere e la capacità di stipulare
        e adempiere al presente Contratto; (c) il nome da te identificato al momento
        della registrazione è il nome commerciale con cui vendi beni e servizi; (d)
        qualsiasi registrazione da te inviata rappresenterà una vendita in buona fede
        da parte tua; (e) adempirai a tutti i tuoi obblighi nei confronti di ciascun
        cliente per il quale invii una registrazione e risolverai qualsiasi controversia
        o reclamo del Cliente direttamente con il Cliente; (f) tu e tutte le registrazioni
        da te avviate sarete conformi a tutte le leggi, norme e regolamenti federali,
        statali e locali applicabili alla tua attività, comprese le leggi e i regolamenti
        fiscali applicabili; (g) non utilizzerai il Servizio, direttamente o indirettamente,
        per alcuna attività fraudolenta o in alcun modo tale da interferire con l''utilizzo
        del Servizio.'
      restricted_use: Uso limitato
      restricted_use_p1: 'Sei tenuto a rispettare tutte le leggi, norme e regolamenti
        applicabili al tuo utilizzo del Servizio (ad esempio, quelli relativi a beni
        rubati, tutela dei consumatori, concorrenza sleale, antidiscriminazione o
        pubblicità ingannevole). Oltre a qualsiasi altro requisito o restrizione stabiliti
        nel presente Contratto, accetti di non fare, né di consentire a terzi di fare,
        quanto segue: (i) accedere o tentare di accedere a sistemi, programmi o dati
        di Bike Index che non sono resi disponibili al pubblico; (ii) consentire a
        terzi di utilizzare e beneficiare del Servizio tramite noleggio, leasing,
        timesharing, service bureau o altro accordo; (iii) trasferire qualsiasi diritto
        concesso a te ai sensi del presente Contratto; (iv) aggirare qualsiasi limitazione
        tecnica del Servizio, utilizzare qualsiasi strumento per abilitare funzionalità
        altrimenti disabilitate nel Servizio, o decompilare, disassemblare o altrimenti
        decodificare il Servizio, salvo nella misura in cui tale restrizione sia espressamente
        vietata dalla legge; (v) eseguire o tentare di eseguire qualsiasi azione che
        possa interferire con il corretto funzionamento del Servizio, impedire l''accesso
        o l''utilizzo del Servizio da parte degli altri nostri utenti o imporre un
        carico irragionevole o sproporzionato sulla nostra infrastruttura; o (vi)
        utilizzare il Servizio in modo diverso da quanto espressamente consentito
        ai sensi della presente sezione.'
      section_a: 'Sezione A: Il servizio Bike Index'
      section_c: 'Sezione C: Registrazione per ottenere lo status di fornitore di
        Bike Index'
      section_d: 'Sezione D: Risoluzione e altre questioni legali'
      security: Sicurezza
      security_body_html: Bike Index è responsabile della protezione della sicurezza
        dei dati dei Clienti in nostro possesso da accessi non autorizzati, perdita
        accidentale o modifiche. Adotteremo procedure amministrative, tecniche e fisiche
        commercialmente ragionevoli per proteggere tutte le informazioni personali
        relative a te e ai tuoi Clienti archiviate sui nostri server. Tuttavia, non
        possiamo garantire che terze parti non autorizzate non saranno mai in grado
        di eludere tali misure o di utilizzare tali informazioni personali per scopi
        impropri. Riconosci di fornire queste informazioni personali relative a te
        e ai tuoi Clienti a tuo rischio e pericolo. Ti consigliamo di consultare la
        nostra <a href="https://bikeindex.org/privacy">Informativa sulla privacy</a>
        , che ti aiuterà a comprendere come raccogliamo, utilizziamo e proteggiamo
        le informazioni che ci fornisci.
      term: Termine
      term_p1: Il presente Contratto entra in vigore alla data in cui lo accetti (indicando
        elettronicamente la tua accettazione) e rimane valido finché utilizzi il Servizio
        o fino alla sua risoluzione da parte di Bike Index.
      termination: Terminazione
      termination_and_other_legal_terms: Risoluzione e altre condizioni legali
      termination_p1: Puoi recedere dal presente Contratto chiudendo il tuo account
        Bike Index in qualsiasi momento seguendo le istruzioni sul nostro sito web
        nel profilo dell'account fornitore della tua organizzazione. Possiamo recedere
        dal presente Contratto e chiudere il tuo account fornitore Bike Index in qualsiasi
        momento per qualsiasi motivo, con effetto immediato previa comunicazione ai
        sensi della Sezione A10 (riferimenti ai nostri rapporti) di cui sopra. Possiamo
        sospendere il tuo account Bike Index e il tuo accesso al Servizio, o recedere
        dal presente Contratto, se (i) determiniamo a nostra esclusiva discrezione
        che non sei idoneo al Servizio per motivi, inclusi, a titolo esemplificativo,
        reclami dei clienti sul tuo utilizzo del servizio, o per qualsiasi altro motivo;
        o (ii) non rispetti una qualsiasi delle disposizioni del presente Contratto.
      terms_of_service_for_vendors: Termini di servizio per i fornitori
      tos_agreement: I Termini e le Condizioni qui descritti costituiscono un "Accordo"
        legale tra il titolare dell'impresa individuale o l'organizzazione commerciale
        indicata come "Fornitore" nella pagina di registrazione del Servizio (talvolta
        indicata come "tu", "tuo", "commerciante") e Bike Index, NFP ("Bike Index").
      vendor_registration: Registrazione del fornitore
      vendor_registration_p1: Il servizio Bike Index Vendor è reso disponibile ai
        sensi del presente Accordo esclusivamente a persone che gestiscono un'attività
        di vendita di beni o servizi o che gestiscono organizzazioni legate al ciclismo.
        Per utilizzare Bike Index per registrare le biciclette, è necessario innanzitutto
        registrarsi per un "Account Venditore". Al momento della registrazione di
        un Account Venditore Bike Index, raccoglieremo informazioni di base tra cui
        nome, nome dell'azienda, sede, indirizzo e-mail e numero di telefono. Se non
        lo si è già fatto, sarà inoltre necessario fornire un indirizzo e-mail e una
        password per il proprio account Bike Index.
      vendor_registration_p2: Quando ti registri come Fornitore, devi anche fornire
        informazioni sul proprietario o responsabile dell'azienda o dell'organizzazione
        e devi essere autorizzato ad agire per conto dell'azienda e avere l'autorità
        di vincolare l'azienda al presente Contratto. Per iscrivere un'azienda all'utilizzo
        del Servizio, devi accettare il presente Contratto per conto dell'azienda.
        Se hai accettato, il termine "tu" si riferirà sia a te, persona fisica, sia
        all'organizzazione aziendale che rappresenti.
      verification: Verifica
      verification_p1: Potremmo richiedere informazioni per verificare la tua identità,
        tra cui la patente di guida o altro documento di identità rilasciato dal governo,
        oppure una licenza commerciale. Potremmo richiedere il tuo permesso per effettuare
        un'ispezione fisica presso la tua sede aziendale ed esaminare le biciclette
        pertinenti alla tua conformità al presente Accordo. La tua mancata ottemperanza
        a una qualsiasi di queste richieste entro cinque (5) giorni potrebbe comportare
        la disattivazione o la chiusura del tuo account Bike Index. Ci autorizzi a
        recuperare ulteriori informazioni su di te da terze parti e altri servizi
        di identificazione.
      verification_p2: Dopo aver raccolto e verificato tutte le tue informazioni,
        Bike Index esaminerà il tuo account e determinerà se hai i requisiti per utilizzare
        il Servizio. Bike Index ti informerà non appena il tuo account sarà stato
        approvato o ritenuto non idoneo all'utilizzo del Servizio.
      verification_p3: Accettando i termini del presente Accordo, ci autorizzi a raccogliere
        informazioni su di te tramite terze parti, inclusi grossisti, distributori
        e altri fornitori di informazioni del settore ciclistico. Riconosci che tali
        informazioni raccolte possono includere il tuo nome, la cronologia degli indirizzi,
        la storia della tua attività e altri dati che ti riguardano. Bike Index può
        aggiornare periodicamente queste informazioni per verificare se continui a
        soddisfare i nostri requisiti di idoneità.
      verification_p4: Accetti che Bike Index sia autorizzata a contattarti e a condividere
        con i nostri partner le informazioni che ti riguardano e che riguardano la
        tua candidatura (inclusa l'approvazione o il rifiuto della stessa), nonché
        il tuo utilizzo di Bike Index.
      we_can_deactivate_html: 'Possiamo disattivare la tua possibilità di registrare
        nuove biciclette o rescindere il presente "Accordo" in qualsiasi momento (soprattutto
        se commetti un errore). Anche tu puoi recedere in qualsiasi momento. La rescissione
        ha effetto immediato. La rescissione non modifica le biciclette precedentemente
        registrate. Questa sezione include anche tutte le clausole legali aggiuntive
        che siamo tenuti ad aggiungere (ad esempio, indennizzo, garanzie, cessione).
        <a href="#section_d">Dettagli completi</a>

        '
      we_provide_you_with_html: 'Vi forniamo un servizio per registrare le biciclette
        con cui interagite; rispetteremo e proteggeremo la vostra privacy e quella
        dei vostri clienti, nonché i vostri dati e informazioni personali. Voi gestite
        la vostra attività, servite i vostri clienti e rispettate tutte le leggi,
        norme e regolamenti. <a href="#section_a">Dettagli completi</a>

        '
      welcome_to_bike_index_html: '<strong>Benvenuti su Bike Index</strong> , un''organizzazione
        no-profit 501(c)(3). Abbiamo sviluppato un servizio di registrazione di biciclette
        accessibile al pubblico (il "Servizio") che offre alle organizzazioni registrate
        su Bike Index ("Fornitori", "voi") la possibilità di registrare in modo rapido
        e semplice le biciclette dei propri "Clienti" - utenti dei loro servizi -
        utilizzando gli "Account" dei Fornitori. Crediamo che un servizio di questo
        tipo scoraggi i furti di biciclette e aiuti i Clienti a recuperare le biciclette
        rubate.

        '
      with_the_following_brief_descriptions: Con le seguenti brevi descrizioni delle
        parti del presente "Accordo", cerchiamo di illustrare gli aspetti più importanti
        del nostro Servizio. Tuttavia, il documento completo contiene dettagli significativi
        che ne giustificano la lettura.
      your_liability: La tua responsabilità
      your_liability_p1: L'utente è responsabile di tutti i reclami, le multe, le
        spese, le sanzioni e le altre responsabilità derivanti dalla violazione del
        presente Contratto e/o dall'utilizzo del Servizio. Bike Index avrà l'autorità
        decisionale finale in merito ai reclami. L'utente sarà tenuto a rimborsare
        Bike Index per la propria responsabilità. L'utente non riceverà alcun rimborso
        delle commissioni pagate a Bike Index.
      your_liability_p2: Senza limitare quanto precede, l'utente accetta di difendere,
        indennizzare e tenere indenne Bike Index e i suoi rispettivi dipendenti e
        agenti (collettivamente "Entità Escludenti") da e contro qualsiasi reclamo,
        causa, richiesta, perdita, responsabilità, danno, azione o procedimento derivante
        da o relativo a (i) la violazione da parte dell'utente di qualsiasi disposizione
        del presente Contratto e/o (ii) l'utilizzo da parte dell'utente del Servizio,
        inclusi, a titolo esemplificativo, eventuali storni, reclami, multe, commissioni,
        sanzioni e spese legali; (iii) la negligenza o la condotta dolosa dell'utente,
        dei suoi dipendenti o agenti; o (iv) gli obblighi di indennizzo di terzi che
        sosteniamo come risultato diretto o indiretto dei suoi atti od omissioni.
      your_privacy: La tua privacy
      your_privacy_body_html: La tua privacy e la protezione dei tuoi dati sono per
        noi di fondamentale importanza. Dichiari di aver ricevuto, letto integralmente
        e accettato i termini della nostra <a href="https://bikeindex.org/privacy">Informativa
        sulla privacy</a> , a cui si fa riferimento nel presente Contratto, che contiene
        il tuo consenso alla raccolta, all'utilizzo, alla conservazione e alla divulgazione
        dei tuoi dati personali, nonché ad altre questioni ivi specificate, e che
        spiega come e per quali scopi raccogliamo, utilizziamo, conserviamo, divulghiamo
        e proteggiamo le informazioni che ci fornisci.
