      bryan_hance_bio_new_html: "<strong>Bryan Hance</strong> ha creato StolenBicycleRegistry.com
        nel 2004 perché gli erano state rubate troppe biciclette e si era reso conto
        che inseguire e recuperare le biciclette rubate era davvero divertente. Lavora
        nel campo della sicurezza informatica e applica metodi e processi OSINT per
        dare la caccia ai ladri di biciclette.\n"
      cofounded_by_html: Cofondata da Seth Herr e Bryan Hance nel 2013, Bike Index
        è un %{description_link}.
      craig_dalton_bio_html: "<strong>Craig Dalton</strong> pensava di essersi ormai
        lasciato alle spalle il settore delle biciclette, finché Bike Index non ha
        bussato alla sua porta. Craig mette a disposizione la sua esperienza imprenditoriale
        per la gestione aziendale di Bike Index.\n"
      gavin_hoover_bio_html: "<strong>Gavin Hoover</strong> ha trascorso dieci anni
        della sua vita pedalando e gareggiando in tutto il mondo, prima di rendersi
        conto che anche altre persone usano la bicicletta come mezzo di trasporto.
        Porta con sé una vasta conoscenza del mondo del ciclismo e si impegna affinché
        tutto funzioni alla perfezione dietro le quinte di Bike Index.\n"
      jan_pecnik_bio_html: "<strong>Jan Pecnik</strong> si è appassionato alle biciclette
        durante il suo master in Olanda, con una specializzazione in imprenditoria
        sociale. Dopo un paio d'anni trascorsi a pedalare in solitaria, ora aiuta
        Bike Index ad espandersi in Europa e oltre.\n"
      merging_the_services: 'Unendo i due servizi, Seth e Bryan hanno creato il servizio
        universale di registrazione delle biciclette che entrambi sognavano: un database
        utilizzato e consultato da privati, negozi di biciclette, dipartimenti di
        polizia e altre app. Un registro di biciclette che offre a chiunque la possibilità
        di registrare e recuperare le proprie biciclette.'
      mike_oleon_bio_html: "<strong>Mike Oleon</strong> si occupa della grafica e
        delle illustrazioni dell'Indice. Se qualcosa ha un bell'aspetto, probabilmente
        è merito suo.\n"
      nonprofit_status: organizzazione senza scopo di lucro 501(c)(3)
      seth_built: Seth ha creato Bike Index quando lavorava come meccanico di biciclette
        perché voleva poter registrare le biciclette dei suoi clienti. Bryan ha sviluppato
        e gestito un servizio di recupero biciclette basato sulla comunità (StolenBikeRegistry.com)
        che ha recuperato biciclette fin dalla prima settimana dalla sua creazione
        nel 2004.
      seth_herr_bio_html: "<strong>Seth Herr</strong> ha imparato a programmare per
        poter creare Bike Index, perché era un meccanico di biciclette ed era frustrato
        dal fatto che non esistesse qualcosa del genere.\n"
      seth_herr_image_title: Questi non sono scaldabraccia ufficiali Bike Index, non
        abbiamo scaldabraccia Bike Index
      simple_efficient_effective: Semplice. Efficiente. Efficace.
      the_team: La squadra
      widely_used: È il servizio di registrazione di biciclette più utilizzato e di
        maggior successo al mondo, con oltre %{bikes_count} biciclette catalogate,
        %{partners_count} partner della comunità e decine di migliaia di ricerche
        giornaliere.
    lightspeed:
      a_few_things_to_note: 'Alcuni punti da tenere a mente:'
      a_listing_on_bike_index_will_be_created: Una volta collegato il tuo account
        Lightspeed Retail al tuo account Bike Index con la registrazione automatica
        attivata, verrà creata automaticamente una scheda su Bike Index per ogni bicicletta
        che vendi. Tutto ciò che devi fare è aggiungere l'indirizzo email del cliente
        e il numero di serie della bicicletta durante un normale acquisto su Lightspeed
        Retail.
      all_you_have_to_do_is_html: Tutto quello che devi fare è andare su %{link},
        dove ti verrà chiesto di autorizzare Bike Index ad accedere al tuo account
        Lightspeed. Sei curioso di sapere quali dati raccogliamo? Leggi %{security_link}.
      already_have_a_sophisticated_html: 'Hai già un sistema di email ben collaudato
        per i tuoi clienti? Bike Index può integrarsi con il tuo flusso di lavoro
        esistente: invia un''email a %{link} per la configurazione.'
      bicycles_sold_before_you_activated_lights: Le biciclette vendute prima dell'attivazione
        dell'integrazione con Lightspeed Retail non verranno registrate.
      bike_index_cofounder: co-fondatore di Bike Index
      how_to_lightspeed_retail: 'Come fare: Integrazione tra Lightspeed Retail e Bike
        Index'
      i_started_bike_index_because: 'Ho creato Bike Index perché volevo registrare
        le biciclette dei miei clienti nel negozio in cui lavoravo: con questa integrazione,
        finalmente offriamo ai negozi un modo per registrare le biciclette senza interferire
        con la vendita.'
      learn_more_about: Scopri di più su
      lightspeed_retail: Lightspeed Retail
      once_you_have_a_bike_index_account_set_up: Una volta creato un account Bike
        Index per il tuo negozio, troverai un link su questa pagina che ti porterà
        all'integrazione.
      privacy_policy_here: Informativa sulla privacy disponibile qui
      registering_with_a_sticker_html: 'Devi registrare le biciclette presso l''ufficio
        del registro locale/comunale e distribuire adesivi con codice QR? <strong>Basta
        aggiungere "Adesivo: <em>numero dell''adesivo della bicicletta</em> " alla
        fine della nota di vendita in Lightspeed</strong> e l''adesivo si collegherà
        alla bicicletta, aggiungendola al registro locale.'
      security_link_text: Domande frequenti sull'integrazione con il POS
      sign_your_shop_up: Registra il tuo negozio
      the_bicycles_owner_will_receive_an_email: Il proprietario della bicicletta riceverà
        un'e-mail con tutte le informazioni necessarie per accedere e gestire l'account,
        oltre a una copia in PDF dei dati di registrazione.
      the_first_step_is_to_create_an_account_html: 'Il primo passo è creare un account
        per te e per il tuo negozio: puoi farlo <a href=''#add_organization'' class=''scroll-to-ref''>in
        fondo a questa pagina.</a>'
      this_page_gives_instructions_html: Questa pagina fornisce istruzioni su come
        integrare la registrazione a Bike Index con il sistema POS Lightspeed Retail.
        <strong><a href="%{about_url}">Consulta la nostra pagina "Chi siamo"</a></strong>
        per informazioni generali su cos'è Bike Index e perché è importante.
      we_believe_that_bicycle_registration: Noi di Bike Index crediamo che la registrazione
        delle biciclette sia uno dei modi più semplici ed efficaci per combattere
        i furti. Grazie alla completa integrazione con Lightspeed Retail, abbiamo
        reso la registrazione un processo rapido, semplice e automatizzato sia per
        te che per i tuoi clienti.
      we_know_you_and_your_customers_html: Sappiamo che voi e i vostri clienti siete
        preoccupati per la privacy e l'accesso alle informazioni di vendita e ai dati
        dei clienti. Bike Index si impegna a mantenere le vostre informazioni al sicuro
        e protette e non invierà mai email non richieste ai vostri clienti. Potete
        consultare la nostra informativa sulla privacy %{link}.
      were_happy_to_answer_any_questions_html: Siamo lieti di rispondere a qualsiasi
        domanda tu abbia sull'integrazione di Bike Index con Lightspeed Retail e siamo
        sempre alla ricerca di modi per migliorarla. Per qualsiasi domanda, dubbio,
        commento o suggerimento, ti preghiamo di inviare un'e-mail a %{link}.
      write_do_not_register: Se un cliente non desidera che una bicicletta venga aggiunta
        a Bike Index, è sufficiente aggiungere "NON REGISTRARE" nelle note di vendita
        e la bicicletta non verrà registrata.
    privacy:
      available_here: disponibile qui
      changes: Modifiche
      changes_p1: Bike Index potrebbe aggiornare periodicamente la presente informativa.
        Vi informeremo di eventuali modifiche significative inviando una notifica
        all'indirizzo email principale specificato nel vostro account di servizio
        Bike Index o pubblicando un avviso ben visibile sul nostro sito. Tali notifiche
        si considereranno ricevute entro 24 ore dalla pubblicazione sul nostro sito
        web o dall'invio tramite email, a meno che non riceviamo una notifica di mancata
        consegna dell'email.
      changes_p2_html: L'utente conserva il diritto di accedere, modificare, correggere
        o eliminare i propri dati personali qualora siano inesatti, in qualsiasi momento.
        Per esercitare tale diritto, si prega di contattare <a href="mailto:contact@bikeindex.org">contact@bikeindex.org</a>
        .
      cookies: Biscotti
      cookies_p1: Un cookie è una piccola quantità di dati, che spesso include un
        identificatore univoco anonimo, che viene inviata al tuo browser dai computer
        di un sito web e memorizzata sul disco rigido del tuo computer. Le informazioni
        memorizzate ti aiutano a connetterti più rapidamente ai siti che hai visitato
        in precedenza.
      cookies_p2: Per utilizzare il servizio Bike Index è necessario utilizzare i
        cookie.
      cookies_p3: Utilizziamo i cookie per registrare le informazioni relative alla
        sessione corrente, ma non utilizziamo cookie permanenti. Ad esempio, è necessario
        effettuare nuovamente l'accesso al proprio account Bike Index dopo un certo
        periodo di tempo per proteggervi dall'accesso accidentale o intenzionale di
        terzi ai contenuti del vostro account.
      data_storage: Archiviazione dei dati
      data_storage_p1: 'Bike Index si avvale di fornitori terzi e partner di hosting
        per fornire l''hardware, il software, la rete, lo storage e le tecnologie
        correlate necessarie al funzionamento di Bike Index. Sebbene Bike Index detenga
        la proprietà del codice, dei database e di tutti i diritti relativi all''applicazione
        Bike Index, l''utente conserva tutti i diritti sui propri dati.  '
      disclosure: Divulgazione
      disclosure_p1_html: Bike Index potrebbe divulgare informazioni di identificazione
        personale in circostanze particolari, ad esempio per ottemperare a mandati
        di comparizione o quando le tue azioni violano i <a href="https://bikeindex.org/terms">Termini
        di servizio</a> .
      general_information: Informazioni generali
      general_information_p1: 'Raccogliamo gli indirizzi e-mail e altre informazioni
        personali condivise da coloro che comunicano con noi, informazioni aggregate
        sulle pagine a cui gli Utenti accedono o che visitano e sulle funzioni che
        gli Utenti svolgono sulle pagine, nonché informazioni fornite volontariamente
        dagli Utenti (come informazioni di sondaggio e/o registrazioni al sito). Le
        informazioni che raccogliamo vengono utilizzate per migliorare il contenuto
        delle nostre pagine Web e la qualità del nostro Servizio e non vengono condivise
        o vendute ad altre organizzazioni per scopi commerciali, salvo per fornire
        i prodotti o servizi da voi richiesti, quando abbiamo il vostro consenso,
        o nelle seguenti circostanze:'
      general_information_p2: È necessario condividere le informazioni al fine di
        indagare, prevenire o intraprendere azioni in relazione ad attività illegali,
        sospette frodi, situazioni che comportano potenziali minacce all'incolumità
        fisica di qualsiasi persona, violazioni dei Termini di servizio della specifica
        applicazione o come altrimenti richiesto dalla legge.
      general_information_p3: Trasferiremo le informazioni che ti riguardano qualora
        Bike Index venga acquisita da un'altra società o si fonda con essa. In questo
        improbabile caso, Bike Index ti informerà via e-mail prima che le tue informazioni
        vengano trasferite e siano soggette a una diversa politica sulla privacy.
      information_gathering: Raccolta e utilizzo delle informazioni
      information_gathering_p1: Quando ti registri a Bike Index, potremmo chiederti
        informazioni come nome, indirizzo email, indirizzo di fatturazione o numero
        di telefono. L'unico campo obbligatorio è l'indirizzo email. Qualunque informazione
        tu scelga di condividere, puoi renderla pubblica o nasconderla nel tuo account
        Bike Index.
      information_gathering_p2: 'Bike Index utilizza le informazioni raccolte per
        i seguenti scopi generali: fornitura di prodotti e servizi, identificazione
        e autenticazione, miglioramento dei servizi, contatto e ricerca.'
      last_updated_html: Ultimo aggiornamento 29 luglio 2017. Versioni precedenti
        e cronologia delle modifiche sono %{link}.
      questions: Domande
      questions_p1_html: Per qualsiasi domanda relativa alla presente Informativa
        sulla privacy, si prega di contattare <a href="mailto:contact@bikeindex.org">contact@bikeindex.org.</a>
      see_terms_link_html: Si prega di consultare %{terms_link} per le definizioni
        dei termini.
      terms_of_service: Termini di servizio
    protect_your_bike:
      211547_bikes_were_reported_stolen: Sono state denunciate 211.547 biciclette
        rubate
      9_in_10_incidents_of_bike_theft: 9 casi su 10 di furto di biciclette
      a_correctly_locked_bicycle: Una bicicletta correttamente chiusa
      according_to_fbi_statistics_html: Secondo le statistiche dell'FBI, %{stolen_link}
        nel 2014, l'anno più recente per il quale sono disponibili dati. Si stima
        che %{theft_link} non vengano denunciati. Sono tantissime biciclette! Se vuoi
        saperne di più sui furti di biciclette negli Stati Uniti, consulta l'articolo
        di Priceonomics %{priceonomics_link} sull'argomento. %{back_link}.
      aim_to_have_the_hardest_bike_to_steal_on_: L'obiettivo è quello di posizionare
        sulla rastrelliera la bicicletta più difficile da rubare. Riteniamo che due
        lucchetti a U, o un lucchetto a U e un cavo robusto, siano il minimo indispensabile
        nelle grandi città per garantire la sicurezza di una bicicletta.
      cable_locks_should_never_be_used_as_primary: I lucchetti a cavo non dovrebbero
        mai essere utilizzati come metodo principale per proteggere una bicicletta
        in città.
      cheaper_and_older_ulocks_can_often_be_broken: I lucchetti a U più economici
        e più vecchi spesso possono essere rotti senza bisogno di attrezzi.
      checkout_out_bestbikelock_html: "- consulta %{link} per consigli sui migliori
        lucchetti."
      correctly_locking_a_bike: Come bloccare correttamente una bicicletta
      dont_rely_on_foot_traffic_to_keep_your_bi: Non affidatevi al passaggio dei pedoni
        per tenere al sicuro la vostra bicicletta; anni di segnalazioni ci hanno insegnato
        che molti furti, in particolare quelli che prevedono il taglio dei lucchetti
        a cavo, avvengono approfittando del viavai della folla o davanti a caffè e
        ristoranti affollati.
      dont_rely_on_the_presence_of_cameras_to_k: Non fare affidamento sulla presenza
        di telecamere per tenere al sicuro la tua bicicletta. Le riprese di sicurezza
        sono raramente di grande utilità una volta che la bicicletta è sparita, e
        i ladri lo sanno.
      exploration: esplorazione
      jump_to_footnote_1: Torna alla nota 1 nel testo
      make_sure_your_bike_isnt_one_of_them: Assicurati che la tua bici non sia una
        di quelle
      many_bicycles_are_stolen_from_garages_and: Molte biciclette vengono rubate da
        garage e magazzini. Assicurate la vostra bicicletta a un oggetto fisso e inamovibile,
        anche se si trova in un luogo "sicuro".
      over_a_million_bikes_are_stolen_yearly: Negli Stati Uniti ogni anno vengono
        rubate oltre un milione di biciclette.
      pink_power_ulocks: I lucchetti Pink Power U-Locks sono un marchio registrato
        di Bike Index, NFP
      protect_your_bike: Proteggi la tua bicicletta!
      thanks_to_researchers_html: Grazie a %{chicago_link} per i suggerimenti e la
        ricerca alla base di queste linee guida. Grazie a %{sweethome_link} per il
        loro eccellente articolo sulla scelta di una serratura.
      the_frame_is_locked_to_an_immovable_objec: Il telaio è bloccato a un oggetto
        immobile. Entrambe le ruote sono fissate.
      tug_on_whatever_youre_about_to_lock_to_ma: Tirate con forza qualsiasi cosa stiate
        per chiudere a chiave per assicurarvi che non possa essere rimossa facilmente.
        I cartelli segnaletici, in particolare, possono essere rimossi facilmente
        svitando i bulloni e alcuni sono già smontabili.
      use_a_ulock_that_costs_at_least_40: Utilizza un lucchetto a U che costi almeno
        40 dollari.
    serials:
      a_serial_number_located_on_a_html: Il numero di serie si trova sul <em>forcellino
        posteriore</em> . Alcune biciclette BMX e alcune biciclette Schwinn riportano
        il numero di serie sul forcellino posteriore. Sulle Schwinn più vecchie, i
        numeri sono stampati sia sul forcellino posteriore lato trasmissione che su
        quello lato opposto; quello sul forcellino lato opposto è il numero di serie.
      a_serial_number_on_the_underside_html: Un numero di serie sulla parte inferiore
        del <em>movimento centrale</em> .
      all_bikes: Tutte le biciclette
      all_have_unique_serial_numbers: ognuna ha un numero di serie univoco.
      another_serial_number_beneath_html: Un altro numero di serie si trova sotto
        il <em>movimento centrale</em> , allineato parallelamente al telaio.
      another_standard_serial_number: Un altro numero di serie standard. Talvolta
        sostituito da un numero di serie nascosto dal percorso di instradamento.
      bike_serial_numbers: Numeri di serie delle biciclette
      bike_with_bottom_circled: Bicicletta con movimento centrale cerchiato
      certain_numbers_and_letters_html: 'Alcuni numeri e lettere sono difficili o
        impossibili da distinguere (ad esempio 0 e O, S e 5). Trattiamo tutti questi
        numeri allo stesso modo: <em>una ricerca per <code>005LLL</code> troverà una
        bicicletta con il numero di serie <code>OOS111</code></em> .'
      doberman_serial: numero di serie del Doberman dropout
      finding_a_bicycle_serial_number: Trovare il numero di serie di una bicicletta
      finding_bicycles_by_serial_number_html: 'Trovare biciclette tramite numero di
        serie su Bike Index è una funzionalità <em>fondamentale</em> del nostro sito.
        Quando cerchi un numero di serie, utilizza la nostra barra di ricerca per
        numeri di serie: è la seconda barra in %{search_form_link}.'
      hopefully_you_can_find_the_serial_html: Spero che tu riesca a trovare il numero
        di serie sulla bicicletta che stai guardando; se hai difficoltà, invia un'e-mail
        a %{link}.
      in_this_picture_html: In questa immagine, <em>200910427-2A</em> è un codice
        del produttore e non un numero di serie. Si consiglia di <strong>non</strong>
        includere il codice del produttore durante la registrazione. Se dovesse sembrare
        che abbiate incluso un codice del produttore, ve lo segnaleremo!
      jump_back_to_footnote: Torna alla nota a piè di pagina %{num} nel testo.
      look_serial: Guarda il numero di serie
      most_bicycles_have_their_serial_number_en: 'Nella maggior parte delle biciclette
        il numero di serie è inciso sotto il movimento centrale, ma a volte si trova
        in altri punti. Ecco alcuni esempi di dove e cosa cercare:'
      okay_fine_so_maybe_html: D'accordo, <em>forse</em> esistono alcune biciclette
        senza numero di serie, ma è raro e tipico solo delle biciclette fatte a mano
        o di quelle molto vecchie.
      our_search_form: il nostro modulo di ricerca
      rad_power_serial: numero di serie di Rad Power
      rad_power_serials_html: Le biciclette Rad Power hanno il numero di serie sul
        <em>tubo sterzo</em> . Questo si trova sulla parte anteriore della bicicletta.
      schwinn_serial: numero di serie Schwinn
      searching_serials_on_bike_index: Ricerca di numeri di serie su Bike Index
      serial_search_input: Input di ricerca seriale
      some_bikes_have_multiple_html: Alcune biciclette hanno <em>più numeri di serie</em>
        .
      some_schwinn_bicycles_also: Alcune biciclette Schwinn riportano anche un numero
        identificativo univoco (il loro numero di serie) sul tubo sterzo.
      standard_serial_number: Numero di serie standard
      the_bottom_bracket_html: La <em>parte inferiore del movimento</em> (dove in
        genere si trovano i numeri di serie) è cerchiata.
      we_do_close_serial_matching_html: 'Effettuiamo una corrispondenza seriale precisa:
        le biciclette con numeri di serie simili a quello inserito vengono visualizzate
        sotto i risultati della corrispondenza, nella sezione "Numeri di serie simili
        a...", <em>a condizione che la ricerca includa un numero di serie con alcune
        cifre/lettere diverse o mancanti</em> .'
      we_do_not_currently_do_partial_html: Al momento non effettuiamo ricerche parziali
        per numero di serie. Se cerchi <code>1234</code> , troverai solo biciclette
        con numero di serie pari a <code>1234</code> o numeri di serie vicini, non
        una bicicletta con numero di serie <code>12345689</code> .
      we_split_bike_serials_up_by_html: Suddividiamo <code>200910427-2A</code> numeri
        di serie delle biciclette in base agli spazi e li memorizziamo separatamente.
        Se vedi più numeri su una bicicletta, come nella foto della bicicletta Look
        qui sopra, prova a cercare <strong>un solo</strong> numero alla volta. Cercando
        <em>M4106I9CA1</em> o <code>M4106I9CA1</code> troverai la bicicletta.
      weve_done_a_few_things_to_make_it_more_li: Abbiamo adottato alcune misure per
        aumentare le probabilità che tu trovi la bicicletta che stai cercando.
      when_adding_a_bike_to_the_index: Quando si aggiunge una bicicletta all'Indice,
        è preferibile inserire tutti i gruppi di numeri e lettere separati da spazi.
    show:
      also_published: 'Pubblicato anche su:'
      updated: Fatto
    terms_text:
      about_our_terms_of_service: Informazioni sui nostri Termini di servizio
      available_here: disponibile qui
