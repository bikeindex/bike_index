  organized:
    ambassador_dashboards:
      getting_started:
        10_tips_for_getting_started_in_your_town: 10 consigli per iniziare nella tua
          città
        be_a_part_of_your_local_cycling_culture: 'Entra a far parte della cultura
          ciclistica locale. Puoi farlo in molti modi: che tu sia un ciclista agonista
          o un pendolare, un appassionato di gravel, un meccanico o semplicemente
          un amante, ci sono diverse modalità per partecipare. Conosci altre persone
          attive nella comunità ciclistica. Anche nelle grandi città, i ciclisti si
          conoscono tra loro e sono molto accoglienti.'
        encourage_people_to_watch: Invita le persone a controllare Craigslist e OfferUp
          nella tua zona e a confrontare le bici sospette in vendita con Bike Index.
          CACCIA DI BICICLETTE TUTTO IL GIORNO.
        engage_your_local_city_and_cops: Contatta il tuo comune e le forze dell'ordine
          locali. Trova le persone che si occupano del sistema di registrazione delle
          biciclette utilizzato nella tua città. A volte una semplice ricerca con
          la frase "_____ registro biciclette" ti metterà in contatto con la persona
          giusta.
        find_and_talk_to_local_bloggers: Individua e contatta i blogger locali e coinvolgili.
          Avranno sicuramente un seguito nella tua zona. Intervista alcune persone
          e fai scrivere e pubblicare degli articoli.
        grow_your_network_via_bike: Amplia la tua rete di contatti contattando le
          vittime di furti di biciclette nella zona. Coinvolgile e chiedi loro di
          aiutarti a fare quanto descritto sopra. È molto probabile che si mostrino
          interessate, soprattutto se sono infastidite dai furti di biciclette.
        have_twitter_connect: Usa Twitter. Connettiti con tutti i ciclisti della tua
          zona su Twitter. Promuovi Bike Index su Twitter e non esitare a taggarci
          e a menzionarci.
        post_and_rt_stolen_bikes: Pubblica e ritwitta le foto di biciclette rubate
          nella tua zona. Metti in contatto le persone che cercano di identificare
          biciclette rubate nella tua comunità. Le persone ti seguiranno e tu potrai
          seguire loro! Non è necessario essere un funzionario per tenere d'occhio
          le biciclette rubate.
        promote_bike_index: Promuovete Bike Index in modo massiccio presso poliziotti,
          negozi di biciclette e organizzazioni ciclistiche, di persona e tramite
          Twitter. È utile presentarsi con del materiale informativo in mano, che
          si tratti di un volantino, degli adesivi o un biglietto da visita.
        ride_your_bike_express_your: Vai in bicicletta! Esprimi il tuo amore per le
          bici in qualsiasi modo tu voglia. Le persone con cui parlerai fanno il loro
          lavoro perché amano le bici come loro. Condividere questa passione con loro
          sarà il primo passo verso una proficua collaborazione.
        seek_out_local_facebook_groups: Cerca gruppi Facebook locali dedicati al ritrovamento
          di biciclette rubate. Esistono, e potresti trovarne più di uno.
