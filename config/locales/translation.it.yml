        PRECEDENTE ALL'EVENTO CHE HA DATO ORIGINE ALLA RICHIESTA DI RISARCIMENTO.
      limitation_of_liability_p4: LA PRESENTE SEZIONE RELATIVA ALLA LIMITAZIONE DI
        RESPONSABILITÀ SI APPLICA INDIPENDENTEMENTE DAL FONDAMENTO GIURIDICO DEL RECLAMO,
        INCLUSI, A TITOLO ESEMPLIFICATIVO, CONTRATTO, ILLECITO CIVILE (COMPRESA LA
        NEGLIGENZA), RESPONSABILITÀ OGGETTIVA O QUALSIASI ALTRA BASE GIURIDICA. LE
        LIMITAZIONI SI APPLICANO ANCHE QUALORA BIKE INDEX SIA STATA INFORMATA DELLA
        POSSIBILITÀ DI TALI DANNI.
      limitation_of_liability_p5: LE DISPOSIZIONI DELLA PRESENTE SEZIONE 10 SI APPLICANO
        NELLA MISURA MASSIMA CONSENTITA DALLA LEGGE NELLA GIURISDIZIONE APPLICABILE.
      limitation_of_liability_p6: Il Servizio è controllato e gestito dalle sue sedi
        negli Stati Uniti. Bike Index non garantisce che il Servizio sia appropriato
