        tips_for_talking_to_bike_shops_url: https://bikeindex.org/news/how-to-get-a-bike-shop-signed-up-in-bike-index
        you_can_mark_stolen_bikes: 'È possibile contrassegnare le biciclette rubate
          come ritrovate (gli ambasciatori di New Orleans hanno richiesto questa funzione:
          ritrovano le biciclette con una rapidità incredibile!).'
        you_can_send_stolen_messages_html: È possibile inviare messaggi di furto alle
          biciclette che non sono ancora state contrassegnate come rubate (come descritto
          in <a href="https://bikeindex.org/news/recovering-bikes-before-they-are-marked-stolen">"Recuperare
