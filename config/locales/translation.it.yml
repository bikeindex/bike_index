      file_a_police_report: Presenta una denuncia alla polizia. Se puoi, recati al
        comando locale e fai in modo che un agente venga a fare rapporto. Coinvolgili
        nella tua situazione!
      if_you_are_here_your_bike_was_probably_stolen: 'Se sei qui, probabilmente la
        tua bicicletta è stata rubata. È una brutta cosa, ma siamo qui per aiutarti.
        Ecco cosa devi fare:'
      keep_an_eye_on_craigslist: Tieni d'occhio Craigslist o simili. Imposta un avviso
        specifico su ifttt.com per segnalare gli annunci che corrispondono alla tua
        bicicletta. Tieni d'occhio app come OfferUp e LetGo, che sono spesso utilizzate
        per la compravendita di biciclette.
      list_recent_stolen_bikes_html: Elenca le biciclette rubate di recente sul tuo
        sito con il nostro %{stolen_widget_link}
      look_for_local_stolen_bike_groups_on_face: Cerca i gruppi locali per le biciclette
        rubate su Facebook (cercate "bici rubate {nome della città}" Questi gruppi
        di volontari esistono in tutto il mondo e possono aiutare i vostri sforzi
        di recupero.
      make_sure_your_bike_is_registered_html: Assicurati che la tua bicicletta sia
        registrata su %{new_bike_link} e su qualsiasi registro locale esistente nella
        tua comunità. Segnala la tua bicicletta come <strong>rubata</strong> su Bike
        Index per attivare la nostra comunità.
