        youre_a_moderator_on_discuss_html: Sei un moderatore su <a href="https://discuss.bikeindex.org">discuss.bikeindex.org</a>
      show:
        actions: Actions
        activities: Attività
        activities_for_registering_cyclists_html: In questa pagina abbiamo elencato
          le attività più efficaci per registrare i ciclisti su Bike Index. Puoi monitorare
          i progressi e trovare spunti da altri Ambassador della tua zona su strategie
          vincenti. Per qualsiasi domanda, scrivici sul nostro canale Slack o inviaci
          un'e-mail all'indirizzo %{help_link}.
        activity: Attività
        being_a_bike_index_ambassador: Essere un ambasciatore di Bike Index significa
          aiutare le persone, nella tua zona, a registrare e proteggere le proprie
          biciclette in caso di furto. Condividi Bike Index con negozi di biciclette,
          associazioni, università e forze dell'ordine per aiutare un numero maggiore
          di ciclisti, di ogni tipo, nella tua area.
