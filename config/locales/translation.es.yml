  organized:
    ambassador_dashboards:
      getting_started:
        10_tips_for_getting_started_in_your_town: 10 consejos para empezar en tu ciudad
        be_a_part_of_your_local_cycling_culture: 'Forma parte de la cultura ciclista
          local. Hay muchas maneras de participar: seas ciclista de competición, de
          ciudad, de gravel, mecánico o aficionado. Conoce a otros ciclistas activos.
          Incluso en una gran ciudad, los ciclistas se conocen entre sí y son muy
          acogedores.'
        encourage_people_to_watch: Anima a la gente a consultar Craigslist y OfferUp
          en tu zona, y a buscar bicicletas sospechosas en venta en el Índice de Bicicletas.
          ¡BÚSQUEDA DE BICICLETAS TODO EL DÍA!
        engage_your_local_city_and_cops: Contacta con tu ayuntamiento y la policía
          local. Busca a las personas encargadas del sistema de registro de bicicletas
          que utilice tu ciudad. A veces, una simple búsqueda con el término "registro
          de bicicletas" te llevará a la persona con la que necesitas hablar.
        find_and_talk_to_local_bloggers: Busca y contacta con blogueros locales y
          convéncelos para que te ayuden. Tendrán seguidores en tu zona. Entrevista
          a algunos y consigue que escriban y publiquen artículos.
        grow_your_network_via_bike: Amplía tu red de contactos con víctimas de robo
          de bicicletas en esa zona. Invítalas a colaborar y a realizar las acciones
          descritas anteriormente. Si están indignadas por los robos de bicicletas,
          es muy probable que se interesen.
        have_twitter_connect: "¡Usa Twitter! Conéctate con todos los ciclistas de
          tu zona en Twitter. Promociona Bike Index en Twitter y no dudes en etiquetarnos
          y mencionarnos."
        post_and_rt_stolen_bikes: Publica y retuitea fotos de bicicletas robadas en
          tu zona. Conecta a personas que buscan bicicletas robadas en tu comunidad.
          ¡La gente te seguirá y tú también podrás seguirlos! No necesitas ser un
          funcionario para estar al tanto de las bicicletas robadas.
        promote_bike_index: Promociona Bike Index sin parar entre policías, tiendas
          de bicicletas y organizaciones ciclistas, tanto en persona como por Twitter.
          Es útil llevar material informativo, ya sea un folleto, pegatinas o una
          tarjeta de visita.
        ride_your_bike_express_your: "¡Monta en bici! Expresa tu pasión por las bicis
          como quieras. Las personas con las que vas a hablar trabajan porque también
          les encantan las bicis. Compartir esa pasión con ellas sentará las bases
          de una gran colaboración."
        seek_out_local_facebook_groups: Busca grupos locales de Facebook que encuentren
          bicicletas robadas. Existen, y puede que haya más de uno.
