    ambassadors_current:
      after_a_couple_of_recoveries_i_got_hooked: Tras recuperar algunas bicicletas,
        me enganché. Fue muy gratificante poder devolver algunas de ellas a personas
        que realmente las aprecian.
      anytown_earth: Cualquier ciudad, tierra
      as_the_founder_of_bicycle_security_adviso: Como fundador de Bicycle Security
        Advisors, cuya misión es proporcionar a las comunidades la mejor información
        sobre cómo mantener las bicicletas aparcadas de forma segura y protegidas
        contra robos, Bike Index es, sin duda alguna, el registro más eficaz que puedes
        utilizar.
      become_a_bike_index_ambassador_and_help_s: Conviértete en embajador de Bike
        Index y ayuda a que las bicicletas robadas encuentren el camino de regreso
        a casa.
      bike_index_allows_us_to_verify_details_ab: Bike Index nos permite verificar
        detalles sobre la bicicleta, información sobre el robo, número de expediente
        policial e información de contacto del propietario. También podemos compartir
        el registro directamente con las autoridades para agilizar el proceso de recuperación.
      bike_index_helped_me_recover_my_beloved_b: Bike Index me ayudó a recuperar mi
        querida bicicleta. Ahora me comprometo a devolver el favor ayudando a promocionar
        Bike Index en mi comunidad.
      bike_index_helps_people_recover_their_sto: Bike Index ayuda a las personas a
        recuperar sus bicicletas robadas, ofrece información sobre la prevención de
        robos y crea una comunidad a través de su sitio web. Además, es una organización
        sin fines de lucro que ha publicado su software como código abierto.
      bike_index_provides_ease_of_use_and_secur: Bike Index ofrece facilidad de uso
        y tranquilidad. Su diseño sencillo lo hace eficaz.
      current_ambassadors: Embajadores actuales
      educating_kids_about_how_to_lock_their_bi: "¡Educar a los niños sobre cómo asegurar
        sus bicicletas y registrarlas es una parte importante para fomentar el uso
        de la bicicleta como medio de transporte!"
      gears: ENGRANAJES
      i_believe_community_involvement_makes_a_d: Creo que la participación de la comunidad
        marca la diferencia en la delincuencia y Bike Index es la forma más fácil
        de involucrarse y realmente marcar la diferencia.
      if_a_person_loses_their_bike_there_is_suc: Cuando una persona pierde su bicicleta,
        experimenta una gran sensación de pérdida, pero al recuperarla siente una
        gran renovación y restauración. Por eso promuevo Bike Index.
      join_their_ranks: Únete a sus filas
      steve_piercys_ambassadorship_is_sponsored_html: El nombramiento <em>de Steve
        Piercy</em> como embajador está patrocinado por <strong>%{sponsor_link}</strong>
        .
      the_heroes_of_bikedom: Los héroes del ciclismo
      whats_your_story: "¿Cuál es tu historia?"
      why_bike_index: "¿Por qué Bike Index?"
      your_name_here: Tu nombre aquí
    ambassadors_how_to:
      9_steps_for_getting_your_stolen_bike_back: 9 pasos para recuperar tu bicicleta
        robada
      access_to_ambassadors_slack_channel_for_s: Acceso al canal de Slack para embajadores
        para compartir ideas, consejos e historias de éxito entre el equipo de Bike
        Index y otros embajadores de todo el país y del mundo.
      anyone_can_help_bike_index_we_are_always_: 'Cualquiera puede ayudar a Bike Index.
        Siempre necesitamos donaciones, contactos con tiendas de bicicletas locales
        y otras organizaciones, y que compartan nuestra información en redes sociales.
        Quizás conozcas una buena tienda o un grupo de defensa de los ciclistas en
        tu ciudad que estaría encantado de registrar las bicicletas de sus usuarios
        y miembros. O tal vez tu departamento de policía local esté buscando actualizar
        su registro. (O quizás ni siquiera tengan uno todavía).

        '
      apply_to_be_an_ambassador_here: Solicita ser embajador aquí.
      apply_today: "¡Solicita hoy mismo!"
      be_a_bike_saver: Sé un salvador de bicicletas
      become_a_bike_index_ambassador: Conviértete en embajador de Bike Index
      become_an_ambassador: Conviértete en embajador
      bike_index_is_a_nonprofit_with_a_big_miss: 'Bike Index es una organización sin
        fines de lucro con una gran misión: registrar todas las bicicletas que existen
        y recuperar todas las que son robadas. Por eso necesitamos tu ayuda. Somos
        un registro nacional, pero tú conoces mejor que nadie a tu comunidad ciclista.'
      bike_index_launches_new_ambassador_progra: Bike Index lanza un nuevo programa
        de embajadores.
      check_out_our_media_resources: Consulta nuestros recursos multimedia
      connect_us_with_city_officials_law_enforc: Conéctese con funcionarios municipales,
        fuerzas del orden y universidades locales interesados en utilizar Bike Index
        como el sistema de registro oficial de la zona.
      current_ambassadors: Embajadores actuales
      follow_bike_index_on_twitter_facebook_and: "¡Sigue a Bike Index en Twitter,
