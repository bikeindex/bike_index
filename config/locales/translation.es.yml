        DE SU CUENTA DE BIKE INDEX O LA INFORMACIÓN CONTENIDA EN ELLA.
      limitation_of_liability_p2: LAS ENTIDADES EXONERADAS NO ASUMEN NINGUNA RESPONSABILIDAD
        POR (A) CUALQUIER LESIÓN PERSONAL O DAÑO A LA PROPIEDAD, DE CUALQUIER NATURALEZA,
        QUE RESULTE DE SU ACCESO O USO DEL SERVICIO; (B) CUALQUIER ACCESO O USO NO
        AUTORIZADO DE LOS SERVIDORES UTILIZADOS EN RELACIÓN CON LOS SERVICIOS Y/O
        CUALQUIER INFORMACIÓN PERSONAL ALMACENADA EN ELLOS; (C) CUALQUIER INTERRUPCIÓN
        O CESE DE LA TRANSMISIÓN HACIA O DESDE EL SERVICIO; (D) CUALQUIER ERROR DE
        SOFTWARE, VIRUS, CABALLO DE TROYA U OTRO CÓDIGO DAÑINO QUE PUEDA TRANSMITIRSE
