        NO OFRECEN DECLARACIONES NI GARANTÍAS SOBRE EL TIEMPO NECESARIO PARA COMPLETAR
        EL PROCESAMIENTO DE UNA TRANSACCIÓN.
      no_warranties_p4: LAS ENTIDADES QUE EXIMEN DE RESPONSABILIDAD NO GARANTIZAN,
        RESPALDAN NI ASUMEN RESPONSABILIDAD ALGUNA POR NINGÚN PRODUCTO O SERVICIO
