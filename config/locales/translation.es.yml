        ACUERDO O LOS SERVICIOS, INCLUYENDO SIN LIMITACIÓN EL USO, LA IMPOSIBILIDAD
        DE USO O LA FALTA DE DISPONIBILIDAD DEL SERVICIO. BAJO NINGUNA CIRCUNSTANCIA
