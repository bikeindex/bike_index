        EN CUALQUIER CONTENIDO O INFORMACIÓN, POR CUALQUIER PÉRDIDA O DAÑO INCURRIDO
        COMO RESULTADO DEL USO DE CUALQUIER CONTENIDO O INFORMACIÓN, EN CADA CASO
        PUBLICADO, ENVIADO POR CORREO ELECTRÓNICO, ALMACENADO, TRANSMITIDO O PUESTO
        A DISPOSICIÓN DE OTRO MODO A TRAVÉS DEL SERVICIO; Y/O (F) CONTENIDO DEL USUARIO
        O LA CONDUCTA DIFAMATORIA, OFENSIVA O ILEGAL DE CUALQUIER TERCERO.
      limitation_of_liability_p3: SIN LIMITAR LAS DISPOSICIONES ANTERIORES DE ESTA
        SECCIÓN 10, LA RESPONSABILIDAD ACUMULADA DE LAS ENTIDADES EXONERADAS HACIA
        USTED SE LIMITARÁ A LOS DAÑOS DIRECTOS Y EN TODOS LOS CASOS NO EXCEDERÁ EN
        CONJUNTO EL MONTO DE LAS TARIFAS PAGADAS POR USTED A BIKE INDEX DURANTE EL
        PERÍODO DE DOCE (12) MESES INMEDIATAMENTE ANTERIOR AL EVENTO QUE DIO ORIGEN
        A LA RECLAMACIÓN DE RESPONSABILIDAD.
      limitation_of_liability_p4: Esta cláusula de limitación de responsabilidad se
        aplica independientemente del fundamento jurídico de la reclamación, incluyendo,
        entre otros, contratos, responsabilidad extracontractual (incluida la negligencia),
        responsabilidad objetiva o cualquier otro fundamento. Estas limitaciones se
        aplican incluso si Bike Index ha sido informado de la posibilidad de tales
        daños.
      limitation_of_liability_p5: LAS DISPOSICIONES DE ESTA SECCIÓN 10 SE APLICARÁN
        EN LA MAYOR MEDIDA PERMITIDA POR LA LEY EN LA JURISDICCIÓN APLICABLE.
      limitation_of_liability_p6: El Servicio se controla y opera desde sus instalaciones
        en los Estados Unidos. Bike Index no garantiza que el Servicio sea apropiado
        o esté disponible para su uso en otras ubicaciones. Quienes accedan o utilicen
        el Servicio desde otras jurisdicciones lo hacen bajo su propia responsabilidad
        y son totalmente responsables del cumplimiento de todas las leyes y regulaciones
        aplicables de los Estados Unidos, extranjeras y locales, incluidas, entre
        otras, las regulaciones de exportación e importación. Salvo que se indique
        explícitamente lo contrario, todo el material que se encuentra en el Servicio
        está dirigido exclusivamente a personas, empresas u otras entidades ubicadas
        en los Estados Unidos.
      no_warranties: Sin garantías
      no_warranties_p1: EL SERVICIO Y TODA LA DOCUMENTACIÓN QUE LO ACOMPAÑA SE PROPORCIONAN
        «TAL CUAL» Y «SEGÚN DISPONIBILIDAD», SIN GARANTÍAS DE NINGÚN TIPO, NI EXPRESAS,
        NI IMPLÍCITAS, NI LEGALES, INCLUIDAS, ENTRE OTRAS, LAS GARANTÍAS IMPLÍCITAS
        DE TITULARIDAD, COMERCIABILIDAD, IDONEIDAD PARA UN FIN PARTICULAR Y NO VIOLACIÓN
        DE DERECHOS. EL USO DEL SERVICIO ES BAJO SU PROPIO RIESGO.
      no_warranties_p2: NINGÚN CONSEJO O INFORMACIÓN, YA SEA ORAL O ESCRITA, QUE USTED
        OBTENGA DEL SERVICIO O A TRAVÉS DE ÉL, O DE (I) BIKE INDEX; O (II) CUALQUIERA
        DE SUS AFILIADOS, AGENTES, DIRECTORES Y EMPLEADOS (COLECTIVAMENTE, LAS "ENTIDADES
        EXONERADORAS" E INDIVIDUALMENTE UNA "ENTIDAD EXONERADORA"), CREARÁ GARANTÍA
        ALGUNA. USTED RECONOCE EXPRESAMENTE QUE BIKE INDEX NO PUEDE GARANTIZAR QUE
        SUS CLIENTES COMPLETEN UN REGISTRO O ESTÉN AUTORIZADOS PARA HACERLO.
      no_warranties_p3: Sin perjuicio de lo anterior, las entidades que se eximen
        de responsabilidad no garantizan que la información que proporcionan o que
        se proporciona a través del servicio sea precisa, fiable o correcta; que el
        servicio satisfaga sus requisitos; que el servicio esté disponible en un momento
        o lugar determinado; que el servicio funcione de forma ininterrumpida o sea
        seguro; que se corrijan los defectos o errores; o que el servicio esté libre
        de virus u otros componentes dañinos. Cualquier material descargado u obtenido
        de otro modo mediante el uso del servicio se descarga bajo su propio riesgo
        y usted será el único responsable de cualquier daño a su propiedad o pérdida
