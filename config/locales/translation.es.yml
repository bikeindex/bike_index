      cofounded_by_html: Cofundada por Seth Herr y Bryan Hance en 2013, Bike Index
        es una %{description_link}.
      craig_dalton_bio_html: "<strong>Craig Dalton</strong> creía haber superado su
        etapa en la industria de la bicicleta hasta que Bike Index llamó a su puerta.
        Craig aporta su experiencia empresarial al área de negocios de Bike Index.\n"
      gavin_hoover_bio_html: "<strong>Gavin Hoover</strong> dedicó diez años de su
        vida a montar en bicicleta y competir por todo el mundo antes de darse cuenta
        de que otras personas también la utilizaban como medio de transporte. Aporta
        un amplio conocimiento del mundo del ciclismo y se encarga de que todo funcione
        correctamente entre bastidores en Bike Index.\n"
      jan_pecnik_bio_html: "<strong>Jan Pecnik</strong> se enamoró de las bicicletas
        mientras cursaba su máster en los Países Bajos, centrado en el emprendimiento
        social. Tras un par de años recorriendo la ciudad en solitario, ahora ayuda
        a Bike Index a expandirse por Europa y otros continentes.\n"
      merging_the_services: 'Al fusionar ambos servicios, Seth y Bryan crearon el
        servicio universal de registro de bicicletas con el que ambos soñaban: una
        base de datos utilizada y consultada por particulares, tiendas de bicicletas,
        departamentos de policía y otras aplicaciones. Un registro de bicicletas que
        permite a todos registrar y recuperar sus bicicletas.'
      mike_oleon_bio_html: "<strong>Mike Oleon</strong> se encarga del diseño gráfico
        y las ilustraciones del Índice. Si algo luce bien, probablemente sea culpa
        suya.\n"
      nonprofit_status: Organización sin fines de lucro 501(c)(3)
      seth_built: Seth creó Bike Index cuando era mecánico de bicicletas porque quería
        poder registrar las bicicletas de sus clientes. Bryan desarrolló y dirigió
        un servicio comunitario de recuperación de bicicletas (StolenBikeRegistry.com)
        que recuperó bicicletas desde la primera semana de su creación en 2004.
      seth_herr_bio_html: "<strong>Seth Herr</strong> aprendió a programar para poder
        crear Bike Index, porque era mecánico de bicicletas y le frustraba que no
        existiera algo parecido.\n"
      seth_herr_image_title: Esos no son calentadores de brazos oficiales de Bike
        Index; no tenemos calentadores de brazos de Bike Index.
      simple_efficient_effective: Sencillo. Eficiente. Efectivo.
      the_team: El equipo
      widely_used: Es el servicio de registro de bicicletas más utilizado y exitoso
        del mundo, con más de %{bikes_count} bicicletas catalogadas, %{partners_count}
        socios comunitarios y decenas de miles de búsquedas diarias.
    lightspeed:
      a_few_things_to_note: 'Algunos puntos a tener en cuenta:'
      a_listing_on_bike_index_will_be_created: Una vez que conectes tu cuenta de Lightspeed
        Retail con tu cuenta de Bike Index y actives el registro automático, se creará
        automáticamente un anuncio en Bike Index para cada bicicleta que vendas. Solo
        tendrás que añadir la dirección de correo electrónico del cliente y el número
        de serie de la bicicleta durante el proceso de compra habitual en Lightspeed
        Retail.
      all_you_have_to_do_is_html: Solo tienes que ir a %{link}, donde se te pedirá
        que autorices a Bike Index a acceder a tu cuenta de Lightspeed. ¿Tienes curiosidad
        por saber qué información recopilamos? Lee %{security_link}.
      already_have_a_sophisticated_html: "¿Ya tienes una comunicación por correo electrónico
        sofisticada con tus clientes? Bike Index puede integrarse con tu flujo de
        trabajo actual. Envía un correo electrónico a %{link} para obtener más información
        sobre la configuración."
      bicycles_sold_before_you_activated_lights: Las bicicletas vendidas antes de
        que activaras la integración de Lightspeed Retail no se registrarán.
      bike_index_cofounder: Cofundador de Bike Index
      how_to_lightspeed_retail: 'Cómo hacerlo: Integración de Lightspeed Retail y
        Bike Index'
      i_started_bike_index_because: Fundé Bike Index porque quería registrar las bicicletas
        de mis clientes en la tienda donde trabajaba; con esta integración, por fin
        ofrecemos a las tiendas una forma de registrar las bicicletas que no interfiera
        con su venta.
      learn_more_about: Obtén más información sobre
      lightspeed_retail: Lightspeed Retail
      once_you_have_a_bike_index_account_set_up: Una vez que hayas configurado una
        cuenta de Bike Index para tu tienda, encontrarás un enlace en esta página
        que te llevará a la integración.
      privacy_policy_here: Política de privacidad aquí
      registering_with_a_sticker_html: '¿Quieres registrar bicicletas en el registro
        municipal o policial local y distribuir pegatinas con código QR? <strong>Simplemente
        añade "Pegatina: <em>número de pegatina de la bicicleta</em> " al final de
        la nota de venta en Lightspeed</strong> y la pegatina se vinculará a la bicicleta
        y la añadirá al registro local.'
      security_link_text: Preguntas frecuentes sobre la integración de puntos de venta
      sign_your_shop_up: Registra tu tienda
      the_bicycles_owner_will_receive_an_email: El propietario de la bicicleta recibirá
        un correo electrónico con toda la información necesaria para iniciar sesión
        y mantener su cuenta, así como una copia en PDF de la información de registro.
      the_first_step_is_to_create_an_account_html: El primer paso es crear una cuenta
        para ti y tu tienda; puedes hacerlo <a href='#add_organization' class='scroll-to-ref'>al
        final de esta página.</a>
      this_page_gives_instructions_html: Esta página ofrece instrucciones para integrar
        el registro de Bike Index con su sistema POS Lightspeed Retail. <strong><a
        href="%{about_url}">Lea nuestra página "Acerca de"</a></strong> para obtener
        información general sobre qué es Bike Index y por qué es importante.
      we_believe_that_bicycle_registration: En Bike Index creemos que el registro
        de bicicletas es una de las formas más sencillas y efectivas de combatir el
        robo de bicicletas. Gracias a nuestra completa integración con Lightspeed
        Retail, hemos convertido el registro en un proceso rápido, sencillo y automatizado
        tanto para usted como para sus clientes.
      we_know_you_and_your_customers_html: Sabemos que usted y sus clientes están
        preocupados por la privacidad y el acceso a su información de ventas y clientes.
        Bike Index se compromete a mantener su información segura y protegida, y nunca
        enviaremos correos electrónicos no solicitados a sus clientes. Puede consultar
        nuestra política de privacidad %{link}.
      were_happy_to_answer_any_questions_html: Estaremos encantados de responder a
        cualquier pregunta que tenga sobre cómo integrar Bike Index con Lightspeed
        Retail y siempre buscamos maneras de mejorar la integración. Envíe un correo
        electrónico a %{link} con cualquier pregunta, duda, comentario o sugerencia.
      write_do_not_register: Si un cliente no quiere que una bicicleta se añada al
        Índice de Bicicletas, simplemente debe añadir "NO REGISTRAR" en las notas
        de la venta y la bicicleta no se registrará.
    privacy:
      available_here: disponible aquí
      changes: Cambios
      changes_p1: Bike Index podrá actualizar esta política periódicamente. Le notificaremos
        sobre cambios importantes enviándole un aviso a la dirección de correo electrónico
        principal especificada en su cuenta de servicio de Bike Index o publicando
        un aviso destacado en nuestro sitio web. Se considerará que usted ha recibido
        dichos avisos dentro de las 24 horas posteriores a su publicación en nuestro
        sitio web o envío por correo electrónico, a menos que recibamos una notificación
        de que el correo electrónico no se entregó.
      changes_p2_html: Usted conserva el derecho a acceder, modificar, corregir o
        eliminar su información personal si esta es inexacta en cualquier momento.
        Para ello, póngase en contacto <a href="mailto:contact@bikeindex.org">con
        contact@bikeindex.org</a> .
      cookies: Galletas
      cookies_p1: Una cookie es una pequeña cantidad de datos, que suele incluir un
        identificador único anónimo, que se envía a tu navegador desde los servidores
        de un sitio web y se almacena en el disco duro de tu ordenador. Esta información
        almacenada te ayuda a conectarte más rápidamente a los sitios que has visitado
        anteriormente.
      cookies_p2: Se requieren cookies para utilizar el servicio Bike Index.
      cookies_p3: Utilizamos cookies para registrar la información de la sesión actual,
        pero no utilizamos cookies permanentes. Por ejemplo, deberá volver a iniciar
        sesión en su cuenta de Bike Index después de un cierto período de tiempo para
        protegerla contra el acceso accidental o intencional de terceros al contenido
        de su cuenta.
      data_storage: Almacenamiento de datos
      data_storage_p1: 'Bike Index utiliza proveedores externos y socios de alojamiento
        para proporcionar el hardware, el software, la red, el almacenamiento y la
        tecnología relacionada necesarios para su funcionamiento. Si bien Bike Index
        es propietaria del código, las bases de datos y todos los derechos de la aplicación,
        usted conserva todos los derechos sobre sus datos.  '
      disclosure: Divulgación
      disclosure_p1_html: Bike Index podrá divulgar información de identificación
        personal en circunstancias especiales, como para cumplir con citaciones judiciales
        o cuando sus acciones infrinjan los <a href="https://bikeindex.org/terms">Términos
        de Servicio</a> .
      general_information: Información general
      general_information_p1: 'Recopilamos las direcciones de correo electrónico y
        otra información personal compartida de quienes se comunican con nosotros,
        información agregada sobre las páginas a las que acceden o visitan los usuarios
        y las funciones que realizan en ellas, así como la información que proporcionan
        voluntariamente (como la información de encuestas o los registros en el sitio).
        La información que recopilamos se utiliza para mejorar el contenido de nuestras
        páginas web y la calidad de nuestro servicio, y no se comparte ni se vende
        a otras organizaciones con fines comerciales, excepto para proporcionar los
        productos o servicios que usted haya solicitado, cuando contemos con su permiso
        o en las siguientes circunstancias:'
      general_information_p2: Es necesario compartir información para investigar,
        prevenir o tomar medidas con respecto a actividades ilegales, sospecha de
        fraude, situaciones que impliquen amenazas potenciales a la seguridad física
        de cualquier persona, violaciones de los Términos de Servicio de la aplicación
        específica o según lo exija la ley.
      general_information_p3: Transferiremos su información si Bike Index es adquirida
        por otra empresa o se fusiona con ella. En este improbable caso, Bike Index
        le notificará por correo electrónico antes de que su información sea transferida
        y quede sujeta a una política de privacidad diferente.
      information_gathering: Recopilación y uso de la información
      information_gathering_p1: Al registrarte en Bike Index, podríamos solicitarte
        información como tu nombre, correo electrónico, dirección de facturación o
        número de teléfono. El único campo obligatorio es el correo electrónico. Puedes
        mostrar u ocultar la información que decidas compartir en tu cuenta de Bike
        Index.
      information_gathering_p2: 'Bike Index utiliza la información recopilada para
        los siguientes fines generales: prestación de productos y servicios, identificación
        y autenticación, mejora de los servicios, contacto e investigación.'
      last_updated_html: 'Última actualización: 29 de julio de 2017. Las versiones
        anteriores y el historial de cambios se encuentran en %{link}.'
      questions: Preguntas
      questions_p1_html: Cualquier pregunta sobre esta Política de Privacidad debe
        dirigirse a <a href="mailto:contact@bikeindex.org">contact@bikeindex.org</a>
      see_terms_link_html: Consulte el %{terms_link} para obtener las definiciones
        de los términos.
      terms_of_service: Condiciones de servicio
    protect_your_bike:
      211547_bikes_were_reported_stolen: Se reportaron 211.547 bicicletas robadas.
      9_in_10_incidents_of_bike_theft: 9 de cada 10 incidentes de robo de bicicletas
      a_correctly_locked_bicycle: Una bicicleta correctamente cerrada con candado
      according_to_fbi_statistics_html: Según las estadísticas del FBI, %{stolen_link}
        en 2014, el año más reciente con datos disponibles. Se estima que %{theft_link}
        no se denuncian. ¡Eso son muchas bicicletas! Si desea leer más sobre el robo
        de bicicletas en los EE. UU., consulte el %{priceonomics_link} de Priceonomics
        sobre el tema. %{back_link}.
      aim_to_have_the_hardest_bike_to_steal_on_: Procure colocar en el aparcamiento
        la bicicleta más difícil de robar. Consideramos que dos candados en U, o un
        candado en U y un cable resistente, son lo mínimo necesario en las grandes
        ciudades para mantener una bicicleta segura.
      cable_locks_should_never_be_used_as_primary: Los candados de cable nunca deben
        utilizarse como medio principal para asegurar una bicicleta en la ciudad.
      cheaper_and_older_ulocks_can_often_be_broken: Los candados en U más baratos
        y antiguos a menudo se pueden romper sin necesidad de herramientas.
      checkout_out_bestbikelock_html: "- Consulta %{link} para obtener recomendaciones
        sobre las mejores cerraduras."
      correctly_locking_a_bike: Cómo asegurar correctamente una bicicleta
      dont_rely_on_foot_traffic_to_keep_your_bi: No confíes en el tránsito peatonal
        para mantener tu bicicleta segura; años de informes nos han enseñado que muchos
        robos, en particular los que implican el corte de candados de cable, ocurren
        al amparo de la actividad de la multitud o frente a cafés o restaurantes concurridos.
      dont_rely_on_the_presence_of_cameras_to_k: No confíes en la presencia de cámaras
        para mantener tu bicicleta segura. Las grabaciones de seguridad rara vez son
        útiles una vez que la bicicleta desaparece, y los ladrones lo saben.
      exploration: exploración
      jump_to_footnote_1: Volver a la nota al pie 1 del texto
      make_sure_your_bike_isnt_one_of_them: Asegúrate de que tu bicicleta no sea una
        de ellas.
      many_bicycles_are_stolen_from_garages_and: Muchas bicicletas son robadas de
        garajes y trasteros. Ata tu bicicleta de forma segura a un objeto fijo, incluso
        si está en un lugar "seguro".
      over_a_million_bikes_are_stolen_yearly: Más de un millón de bicicletas son robadas
        cada año en Estados Unidos.
      pink_power_ulocks: Los candados Pink Power U-Locks son una marca registrada
        de Bike Index, NFP.
      protect_your_bike: "¡Protege tu bicicleta!"
      thanks_to_researchers_html: Gracias a %{chicago_link} por sus sugerencias y
        la investigación que respalda estas directrices. Gracias a %{sweethome_link}
        por su excelente artículo sobre cómo elegir una cerradura.
      the_frame_is_locked_to_an_immovable_objec: El bastidor está fijado a un objeto
        inamovible. Ambas ruedas están aseguradas.
      tug_on_whatever_youre_about_to_lock_to_ma: Tira de lo que vayas a bloquear para
        asegurarte de que no se pueda quitar fácilmente. Los postes de señalización,
        en particular, se pueden quitar fácilmente desatornillándolos, y algunos ya
        vienen sueltos.
      use_a_ulock_that_costs_at_least_40: Utilice un candado en U que cueste al menos
        40 dólares.
    serials:
      a_serial_number_located_on_a_html: El número de serie se encuentra en la <em>puntera
        trasera</em> . Algunas bicicletas BMX y algunas bicicletas Schwinn tienen
        el número de serie en la puntera trasera. En las Schwinn más antiguas, hay
        números estampados tanto en la puntera trasera del lado de la transmisión
        como en la del lado opuesto; el que está en la puntera del lado opuesto es
        el número de serie.
      a_serial_number_on_the_underside_html: Un número de serie en la parte inferior
        del <em>soporte del pedalier</em> .
      all_bikes: Todas las bicicletas
      all_have_unique_serial_numbers: Todos tienen números de serie únicos.
      another_serial_number_beneath_html: Otro número de serie se encuentra debajo
        del <em>soporte inferior</em> , alineado en paralelo al cuadro.
      another_standard_serial_number: Otro número de serie estándar. En ocasiones,
        se reemplaza por un número de serie oculto por el enrutamiento.
      bike_serial_numbers: Números de serie de las bicicletas
      bike_with_bottom_circled: Bicicleta con el eje de pedalier rodeado con un círculo.
      certain_numbers_and_letters_html: 'Algunos números y letras son difíciles o
        imposibles de distinguir (por ejemplo, 0 y O, S y 5). Tratamos todos estos
        números de la misma manera: <em>una búsqueda de <code>005LLL</code> coincidirá
        con una bicicleta con el número de serie <code>OOS111</code></em> .'
      doberman_serial: Número de serie del Doberman Dropout
      finding_a_bicycle_serial_number: Cómo encontrar el número de serie de una bicicleta
      finding_bicycles_by_serial_number_html: La función de búsqueda de bicicletas
        por número de serie en Bike Index es <em>fundamental</em> para nuestro funcionamiento.
        Para buscar un número de serie, utilice nuestra barra de búsqueda, que se
        encuentra en la segunda barra de %{search_form_link}.
      hopefully_you_can_find_the_serial_html: Con suerte, podrás encontrar el número
        de serie de la bicicleta que estás mirando; si tienes problemas, envía un
        correo electrónico a %{link}.
      in_this_picture_html: En esta imagen, <em>200910427-2A</em> es un número de
        fabricante, no un número de serie. Recomendamos <strong>no</strong> incluir
        el número de fabricante al registrar el producto. Si parece que lo ha incluido,
        ¡se lo notificaremos!
      jump_back_to_footnote: Vuelva a la nota al pie %{num} en el texto.
      look_serial: Mira el número de serie
      most_bicycles_have_their_serial_number_en: 'La mayoría de las bicicletas tienen
        el número de serie grabado debajo del eje de pedalier, pero a veces se encuentra
        en otros lugares. Aquí tienes algunos ejemplos de dónde y qué buscar:'
      okay_fine_so_maybe_html: Vale, de acuerdo, <em>puede que</em> haya algunas bicicletas
        sin número de serie, pero esto es raro y típico solo en bicicletas hechas
        a mano o bicicletas muy antiguas.
      our_search_form: nuestro formulario de búsqueda
      rad_power_serial: Número de serie de Rad Power
      rad_power_serials_html: Las bicicletas Rad Power tienen su número de serie en
        el <em>tubo de dirección</em> . Este se encuentra en la parte delantera de
        la bicicleta.
      schwinn_serial: Número de serie de Schwinn
      searching_serials_on_bike_index: Búsqueda de números de serie en Bike Index
      serial_search_input: Entrada de búsqueda serial
      some_bikes_have_multiple_html: Algunas bicicletas tienen <em>varios números
        de serie</em> .
      some_schwinn_bicycles_also: Algunas bicicletas Schwinn también tienen el número
        de identificación único (su número de serie) en el tubo de dirección.
      standard_serial_number: Número de serie estándar
      the_bottom_bracket_html: El <em>soporte inferior</em> (donde normalmente se
        ubican los números de serie) está marcado con un círculo.
      we_do_close_serial_matching_html: 'Realizamos una coincidencia de números de
        serie cercanos: las bicicletas con números de serie que son cercanos al número
        de serie que ingresó se muestran debajo de los resultados de coincidencia
        bajo el encabezado "Números de serie cercanos a..." - <em>dada una búsqueda
        de un número de serie con un par de números/letras que son diferentes o faltan</em>
        .'
      we_do_not_currently_do_partial_html: Actualmente no realizamos búsquedas parciales
        de números de serie. Si busca <code>1234</code> , solo encontrará bicicletas
        con números de serie de <code>1234</code> o cercanos a este, no una bicicleta
        con el número de serie <code>12345689</code> .
      we_split_bike_serials_up_by_html: Separamos los números de serie de las bicicletas
        por espacios y los almacenamos por separado. Si ve varios números en una bicicleta,
        como en la foto de la bicicleta Look de arriba, intente buscar <strong>solo
        uno</strong> de ellos a la vez. <em>Si</em> busca <code>M4106I9CA1</code>
        o <code>200910427-2A</code> encontrará la bicicleta.
      weve_done_a_few_things_to_make_it_more_li: Hemos hecho algunas cosas para que
        tengas más probabilidades de encontrar la bicicleta que buscas.
      when_adding_a_bike_to_the_index: Al añadir una bicicleta al índice, lo mejor
        es introducir todos los grupos de números y letras separados por espacios.
    show:
      also_published: 'También publicado en:'
      updated: Actualizado
    terms_text:
      about_our_terms_of_service: Acerca de nuestros Términos de Servicio
      available_here: disponible aquí
      best_effort: Bike Index no garantiza que (i) el servicio cumpla con sus requisitos
        específicos, (ii) el servicio sea ininterrumpido, puntual, seguro o libre
        de errores, (iii) los resultados que se puedan obtener del uso del servicio
        sean precisos o confiables, (iv) la calidad de cualquier producto, servicio,
        información u otro material comprado u obtenido por usted a través del servicio
        cumpla con sus expectativas, y (v) cualquier error en el Servicio sea corregido.
      bike_index_reserves: Bike Index se reserva el derecho, en cualquier momento
        y de forma periódica, a modificar o interrumpir, temporal o permanentemente,
        el Servicio (o cualquier parte del mismo) con o sin previo aviso.
      bike_index_shall_not_be_liable: Bike Index no será responsable ante usted ni
        ante ningún tercero por cualquier modificación, suspensión o interrupción
        del Servicio.
      by_creating_account: Al crear una "Cuenta" y utilizar el sitio web BikeIndex.org
        ("Servicio") o cualquier servicio de Bike Index, NFP ("Bike Index"), usted
        acepta estar sujeto a los siguientes términos y condiciones ("Términos del
        Servicio"). SI USTED CELEBRA ESTE ACUERDO EN NOMBRE DE UNA EMPRESA U OTRA
        ENTIDAD LEGAL, USTED DECLARA QUE TIENE LA AUTORIDAD PARA VINCULAR A DICHA
        ENTIDAD, SUS AFILIADOS Y TODOS LOS USUARIOS QUE ACCEDEN A NUESTROS SERVICIOS
        A TRAVÉS DE SU CUENTA A ESTOS TÉRMINOS Y CONDICIONES, EN CUYO CASO LOS TÉRMINOS
        "USTED" O "SU" SE REFIEREN A DICHA ENTIDAD, SUS AFILIADOS Y LOS USUARIOS ASOCIADOS
        A ELLA. SI NO TIENE DICHA AUTORIDAD O SI NO ESTÁ DE ACUERDO CON ESTOS TÉRMINOS
        Y CONDICIONES, NO DEBE ACEPTAR ESTE ACUERDO NI UTILIZAR LOS SERVICIOS.
      by_giving_bike_shops_html: Al permitir que las tiendas de bicicletas, las organizaciones
        ciclistas y los departamentos de policía registren bicicletas directamente
        para sus usuarios, buscamos incentivar el registro de bicicletas, apoyar la
        cultura ciclista local y garantizar registros precisos. Hemos intentado redactar
        estos Términos de Servicio de la manera más sencilla y comprensible posible.
        Desafortunadamente, las realidades del mundo legal hacen que esto sea una
        tarea muy difícil. Por lo tanto, si tiene alguna pregunta o inquietud, o simplemente
        desea comprender mejor cómo funciona Bike Index, no dude en %{contact_link}.
      content_on_the_service: El "Contenido" del Servicio se define como cualquier
        información que los Usuarios ingresen en él. Se consideran Usuarios a quienes
        utilizan el Servicio Bike Index y aceptan los Términos del Servicio. Si bien
        Bike Index prohíbe ciertas conductas y Contenido en el Servicio, usted comprende
        y acepta que Bike Index no se responsabiliza del Contenido publicado en el
        Servicio y que, no obstante, podría estar expuesto a dicho material. Usted
        acepta usar el Servicio bajo su propio riesgo. El incumplimiento de cualquiera
        de los términos a continuación resultará en la cancelación de su Cuenta.
      if_bike_index_html: 'Si Bike Index realiza cambios sustanciales en estos Términos,
        le notificaremos por correo electrónico o mediante un aviso en nuestro sitio
        antes de que los cambios entren en vigor. Cualquier nueva función que amplíe
        o mejore el Servicio actual, incluyendo el lanzamiento de nuevas herramientas
        y recursos, estará sujeta a los Términos de Servicio. El uso continuado del
        Servicio después de dichos cambios constituirá su consentimiento a los mismos.
        Puede consultar la versión más reciente de los Términos de Servicio en cualquier
        momento en: %{terms_link}.'
      last_updated_html: 'Última actualización: 29 de julio de 2017. Las versiones
        anteriores y el historial de cambios se encuentran en %{link}.'
      may_be_terminated: Usted comprende que el procesamiento técnico y la transmisión
        del Servicio, incluido su Contenido, pueden transferirse sin cifrar e implicar
        (a) transmisiones a través de varias redes; y (b) cambios para ajustarse y
        adaptarse a los requisitos técnicos de las redes o dispositivos de conexión.
      no_abuse: Cualquier abuso verbal, físico, escrito o de otro tipo (incluidas
        las amenazas de abuso o represalias) contra cualquier cliente, empleado, miembro
        o directivo de Bike Index conllevará la cancelación inmediata de la cuenta.
      no_spam: No debe cargar, publicar, alojar ni transmitir correos electrónicos,
        SMS o mensajes de "spam" no solicitados.
      no_waiver: El hecho de que Bike Index no ejerza o haga cumplir algún derecho
        o disposición de las Condiciones del Servicio no constituirá una renuncia
        a dicho derecho o disposición. Las Condiciones del Servicio constituyen el
        acuerdo completo entre usted y Bike Index y rigen su uso del Servicio, reemplazando
        cualquier acuerdo previo entre usted y Bike Index (incluidas, entre otras,
        las versiones anteriores de las Condiciones del Servicio). Usted acepta que
        estas Condiciones del Servicio y su uso del Servicio se rigen por la ley del
        estado de Illinois.
      questions_html: Las preguntas sobre los Términos de Servicio deben enviarse
        a %{contact_email_link}.
      section_a_header: 'Sección A: Reconocimiento y aceptación de los términos por
        parte del usuario'
      section_b_header: 'Sección B: Condiciones de la cuenta'
      section_c_header: 'Sección C: Modificaciones al servicio'
      section_d_header: 'Sección D: Derechos de autor y propiedad del contenido'
      section_e_header: 'Sección E: Condiciones generales'
      support_for_bike_index_services: Actualmente, la asistencia para los servicios
        de Bike Index solo está disponible en inglés, a través de correo electrónico.
      terms_of_service: Condiciones de servicio
      third_party_vendors: Usted comprende que Bike Index utiliza proveedores externos
        y socios de alojamiento para proporcionar el hardware, el software, la red,
        el almacenamiento y la tecnología relacionada necesarios para el funcionamiento
        del Servicio.
      we_claim_no_ip: No reclamamos ningún derecho de propiedad intelectual sobre
        el material que usted proporciona al Servicio. Su perfil y el material que
        suba le pertenecen. Sin embargo, el contenido que suba sobre sus bicicletas
        podrá ser visto públicamente, y al configurar su perfil como público, la información
        que agregue también será visible para todos. Usted acepta que otros puedan
        ver este contenido.
      we_dont_prescreen_content: Bike Index no realiza una revisión previa del Contenido,
        pero Bike Index y su representante tienen el derecho (pero no la obligación),
        a su entera discreción, de rechazar o eliminar cualquier Contenido que esté
        disponible a través del Servicio.
      we_may_remove_content: Podemos, pero no estamos obligados a, eliminar Contenido
        y Cuentas que contengan Contenido que, a nuestra entera discreción, consideremos
        ilegal, ofensivo, amenazante, calumnioso, difamatorio, pornográfico, obsceno
        o de cualquier otro modo objetable, o que viole la propiedad intelectual de
        cualquier parte o estos Términos de Servicio.
      welcome_to_bike_index_html: <strong>Bienvenido a Bike Index</strong> , una organización
        sin fines de lucro 501(c)(3). Hemos desarrollado un servicio de registro de
        bicicletas de acceso público (el "Servicio") que le permite guardar y compartir
        sus bicicletas en internet.
      you_agree_not_to_resell: Usted acepta no vender, revender ni explotar ninguna
        parte del Servicio, el uso del Servicio o el acceso al Servicio sin el permiso
        expreso por escrito de Bike Index.
      you_are_responsible_for_content: Usted es responsable de todo el Contenido publicado
        y de la actividad que se produzca en su cuenta (incluso cuando el Contenido
        sea publicado por otras personas que tengan cuentas asociadas a la suya o
        acceso a ella).
      you_are_responsible_for_security: Usted es responsable de mantener la seguridad
        de su cuenta y contraseña. Bike Index no se hace responsable de ninguna pérdida
        o daño que pueda sufrir por no cumplir con esta obligación de seguridad.
      you_may_not_use_for_illegal: No podrá utilizar el Servicio para ningún fin ilegal
        o no autorizado. Al utilizar el Servicio, no deberá infringir ninguna ley
        de su jurisdicción (incluidas, entre otras, las leyes de derechos de autor
        o marcas registradas).
      you_must_be_human: Debes ser humano. No se permiten cuentas registradas por
        "bots" ni mediante otros métodos automatizados.
      you_must_notify: No debe modificar, adaptar ni piratear el Servicio ni modificar
        otro sitio web de manera que se dé a entender falsamente que está asociado
        con el Servicio, Bike Index o cualquier otro servicio de Bike Index.
      you_must_provide_email: Para completar el proceso de registro, debe proporcionar
        una dirección de correo electrónico válida.
      you_shall_defend_bike_index: Usted deberá defender a Bike Index contra cualquier
        reclamo, demanda, pleito o procedimiento hecho o iniciado contra Bike Index
        por un tercero que alegue que su Contenido, o su uso del Servicio en violación
        de este Acuerdo, infringe o se apropia indebidamente de los derechos de propiedad
        intelectual de un tercero o viola la ley aplicable, e indemnizará a Bike Index
        por cualquier daño finalmente otorgado en su contra, y por los honorarios
        razonables de abogados incurridos por Bike Index en relación con cualquier
        reclamo, demanda, pleito o procedimiento de este tipo; siempre que Bike Index
        (a) le notifique por escrito de inmediato el reclamo, demanda, pleito o procedimiento;
        (b) le otorgue el control exclusivo de la defensa y la resolución del reclamo,
        demanda, pleito o procedimiento (siempre que usted no pueda resolver ningún
        reclamo, demanda, pleito o procedimiento a menos que la resolución libere
        incondicionalmente a Bike Index de toda responsabilidad); y (c) le brinde
        toda la asistencia razonable, a su cargo.
      your_use_of_the_service: El uso del Servicio queda bajo su exclusiva responsabilidad.
        El servicio se proporciona «tal cual» y «según disponibilidad».
    vendor_terms_text:
      about_terms_of_service_for_vendors: Acerca de nuestros términos de servicio
        para proveedores
      available_here: disponible aquí
      because_bike_index_html: 'Dado que Bike Index depende de la colaboración con
        organizaciones ciclistas, es posible que necesitemos verificar su condición
        de organización ciclista. Usted nos proporciona información básica sobre su
        organización y nosotros nos encargaremos de verificarla (podemos trabajar
        con terceros para ello) y aprobar su cuenta de proveedor, a menos que se considere
        de riesgo (por nosotros o nuestros colaboradores). Usted nos autoriza a realizar
        todo esto y a actualizar la información periódicamente; de lo contrario, nos
        veremos obligados a denegarle el servicio. <a href="#section_c">Detalles completos</a>

        '
      becoming_a_vendor: Cómo convertirse en vendedor en Bike Index
      bike_index_vendor_service: Servicio de proveedores de índices de bicicletas
      bike_index_vendor_tos: Términos de servicio del proveedor de Bike Index
      binding_arbitration: Arbitraje vinculante
      binding_arbitration_p1: Cualquier controversia o reclamación que surja de estos
        Términos de Servicio o esté relacionada con ellos, o con cualquier incumplimiento
        de los mismos, se resolverá mediante arbitraje administrado por la Asociación
        Americana de Arbitraje de conformidad con su Reglamento de Arbitraje Comercial,
        y la sentencia dictada por el árbitro o los árbitros podrá presentarse ante
        cualquier tribunal con jurisdicción competente.
      by_giving_bike_shop_employees_html: 'Al brindar a los empleados de tiendas de
        bicicletas y a las organizaciones de defensa del ciclismo (Vendedores) la
        posibilidad de agregar bicicletas al Servicio de forma gratuita, buscamos
        fomentar el registro y combatir la postergación del registro de bicicletas.
        Además, hemos desarrollado una integración con Lightspeed que permite a las
        tiendas que utilizan Lightspeed como punto de venta registrar las bicicletas
        inmediatamente después de la venta. Hablaremos de esto en detalle más adelante
        en este documento. Si tiene alguna pregunta o inquietud, o simplemente desea
        comprender mejor cómo funciona Bike Index, no dude en %{contact_link}.

        '
      customer_service: Servicio al cliente
      customer_service_body: Le brindaremos servicio al cliente para resolver cualquier
        problema relacionado con su cuenta de Bike Index, el registro de bicicletas
        a través de nuestro servicio y el uso de nuestro software.
      disclosures_and_notices: Divulgaciones y avisos
      disclosures_and_notices_p1: Usted acepta que Bike Index puede proporcionarle
        avisos y divulgaciones sobre el Servicio publicándolos en nuestro sitio web,
        enviándolos por correo electrónico a la dirección de correo electrónico registrada
        en su cuenta de Bike Index o por correo postal a la dirección registrada en
        su cuenta de proveedor de Bike Index. Asimismo, acepta que los avisos y divulgaciones
        electrónicos tienen el mismo significado y efecto que si se los hubiéramos
        proporcionado en papel. Se considerará que usted ha recibido dichos avisos
        y divulgaciones dentro de las 24 horas posteriores a su publicación en nuestro
        sitio web o envío por correo electrónico, a menos que recibamos una notificación
        de que el correo electrónico no se entregó.
      effects_of_deactivation: Efectos de la desactivación
      effects_of_deactivation_p1: Tras la desactivación de su cuenta de vendedor en
        Bike Index, dejará de poder añadir bicicletas a través del Servicio de inmediato.
        Podrá seguir accediendo al resto del servicio.
      effects_of_termination: Efectos de la rescisión
      effects_of_termination_p1: Tras la cancelación y el cierre de su cuenta de Bike
        Index, interrumpiremos inmediatamente su acceso al Servicio de Proveedores.
        Usted acepta dejar de aceptar nuevos registros a través del Servicio. No se
        le reembolsará el resto de las tarifas que haya pagado por el Servicio si
        su acceso o uso del mismo se cancela o suspende. Bike Index retendrá los fondos
        que se encuentren bajo nuestra custodia.
      effects_of_termination_p2: 'Al finalizar, usted acepta: (i) cesar inmediatamente
        su uso del Servicio, (ii) dejar de usar cualquier marca comercial de Bike
        Index y eliminar inmediatamente cualquier referencia y logotipo de Bike Index
        de su negocio, (iii) seguir sujeto a este Acuerdo, (iv) que la licencia otorgada
        en virtud de este Acuerdo finalizará, (v) que nos reservamos el derecho (pero
        no la obligación) de eliminar toda su información y datos de cuenta almacenados
        en nuestros servidores, y (e) no seremos responsables ante usted por compensación,
        reembolso o daños en relación con su uso del Servicio, o cualquier terminación
        o suspensión del Servicio o eliminación de su información o datos de cuenta.'
      governing_law: Ley aplicable
      governing_law_p1: Los términos de estas Condiciones de Servicio para Proveedores
        se interpretarán y aplicarán de conformidad con las leyes del Estado de Illinois.
        Todas las partes se someten a la jurisdicción personal y al fuero de cualquier
        tribunal ubicado en el Condado de Cook, Illinois, y renuncian a cualquier
        objeción basada en la falta de jurisdicción, el fuero, la inconveniencia del
        foro judicial o cualquier otro motivo.
      illegal_use: Sospecha de uso no autorizado o ilegal
      illegal_use_p1: Nos reservamos el derecho de no autorizar ni procesar ninguna
        transacción que usted envíe si consideramos que infringe este Acuerdo, cualquier
        otro acuerdo de Bike Index o si lo expone a usted, a otros usuarios de Bike
        Index, a nuestros procesadores o a Bike Index a algún daño, incluyendo, entre
        otros, fraude y otros actos delictivos. Por la presente, usted nos autoriza
        a compartir información con las autoridades policiales sobre usted, sus transacciones
        o su cuenta de servicio de Bike Index si sospechamos razonablemente que su
        uso de Bike Index ha sido con fines no autorizados, ilegales o delictivos.
      last_updated_html: 'Última actualización: 29 de julio de 2017. Las versiones
        anteriores y el historial de cambios se encuentran en %{link}.'
      license_trademarks: Su licencia; nuestras marcas registradas
      license_trademarks_p1: Bike Index le otorga una licencia personal, limitada,
        no exclusiva, revocable e intransferible, sin derecho a sublicenciar, para
        acceder y usar electrónicamente el Servicio únicamente para registrarse, administrar
        los registros de bicicletas que usted cree y contactar a los propietarios
        de bicicletas robadas si encuentra alguna. El Servicio incluye nuestro sitio
        web, cualquier software, programa, documentación, herramienta, servicio en
        línea, componente y cualquier actualización (incluyendo mantenimiento de software,
        información de servicio, contenido de ayuda, correcciones de errores o versiones
        de mantenimiento) que Bike Index le proporcione. Usted tendrá derecho a descargar
        actualizaciones del Servicio, sujeto a los términos adicionales que se le
        comuniquen en ese momento, cuando Bike Index ponga dichas actualizaciones
        a su disposición.
      license_trademarks_p2: También podemos poner a su disposición periódicamente
        ciertos logotipos, marcas registradas u otros identificadores de Bike Index.
        No está obligado a utilizarlos y puede hacerlo como desee.
      lightspeed_integration: Integración a la velocidad de la luz
      lightspeed_integration_p1: Para registrar la bicicleta de un cliente directamente
        desde tu tienda, debes recopilar el número de serie y la dirección de correo
        electrónico del cliente. Si tu tienda utiliza Lightspeed Retail y la integración
        de Bike Index con Lightspeed, esta última recopilará y nos enviará toda la
        información disponible en el momento de la venta. Esta información puede incluir,
        entre otros datos, el número de teléfono, la dirección, el color y la talla
        de la bicicleta. Solo recopilamos la información necesaria para registrar
        la bicicleta de tu cliente.
      lightspeed_integration_p2: Nos comprometemos a mantener la privacidad de la
        información de nuestros clientes. No almacenamos ninguna información transmitida
        desde Lightspeed, salvo la necesaria para crear el registro en Bike Index.
        Toda la comunicación entre Lightspeed y nuestro Servicio está cifrada y se
        rige por nuestros Términos y Condiciones, así como por los términos y acuerdos
        aplicables establecidos por Lightspeed.
      limitation_of_liability: Limitación de responsabilidad y daños
      limitation_of_liability_p1: EN NINGÚN CASO UNA ENTIDAD EXONERADA (SEGÚN SE DEFINE
        EN LA SECCIÓN 7 ANTERIOR) SERÁ RESPONSABLE DE NINGUNA PÉRDIDA DE BENEFICIOS,
        PÉRDIDA DE DATOS O CUALQUIER DAÑO INDIRECTO, PUNITIVO, INCIDENTAL, ESPECIAL,
