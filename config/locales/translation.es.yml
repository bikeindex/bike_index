        WEB O SERVICIO CON HIPERVÍNCULOS, NI POR NINGÚN PRODUCTO O SERVICIO PRESENTADO
        EN NINGÚN BANNER U OTRO ANUNCIO PUBLICITARIO, Y BIKE INDEX NO PARTICIPARÁ
        NI SUPERVISARÁ DE NINGUNA MANERA NINGUNA TRANSACCIÓN ENTRE USTED Y LOS PROVEEDORES
        TERCEROS DE PRODUCTOS O SERVICIOS.
      our_role: Nuestro papel
      our_role_body: Nuestro servicio le ayuda a registrar bicicletas de forma rápida
        y sencilla para sus clientes, y les permite modificar la mayoría de los aspectos
        de sus registros. Deberá registrarse en Bike Index para utilizar el servicio
        de vendedor de Bike Index (consulte la sección «Cómo convertirse en vendedor
        de Bike Index»). Además, no asumimos ninguna responsabilidad por las bicicletas,
        triciclos u otros tipos de vehículos (en adelante, «Bicicletas») registrados
        a través de nuestro servicio.
      ownership: Propiedad
      ownership_p1: El Servicio se licencia, no se vende. Nos reservamos todos los
        derechos no expresamente otorgados en este Acuerdo. El Servicio está protegido
        por derechos de autor, secretos comerciales y otras leyes de propiedad intelectual.
        Somos titulares del título, los derechos de autor y demás derechos de propiedad
        intelectual a nivel mundial (según se definen a continuación) del Servicio
        y de todas sus copias. Este Acuerdo no le otorga ningún derecho sobre nuestras
        marcas comerciales ni marcas de servicio.
      ownership_p2: Para los fines del presente Acuerdo, "Derechos de Propiedad Intelectual"
        significa todos los derechos de patente, derechos de autor, derechos sobre
        diseños de circuitos integrados, derechos morales, derechos de publicidad,
        derechos de marca registrada, imagen comercial y marca de servicio, fondo
        de comercio, derechos de secreto comercial y otros derechos de propiedad intelectual
        que puedan existir actualmente o que puedan surgir en el futuro, y todas las
        solicitudes, registros, renovaciones y extensiones de los mismos, conforme
        a las leyes de cualquier estado, país, territorio u otra jurisdicción.
      ownership_p3: Usted puede optar por enviar, o nosotros podemos invitarle a enviar,
        comentarios o ideas sobre el Servicio, incluyendo, entre otros, sugerencias
        para mejorar el Servicio o nuestros productos ("Ideas"). Al enviar cualquier
        Idea, usted acepta que su divulgación es gratuita, no solicitada y sin restricciones,
        y que no generará ninguna obligación fiduciaria ni de otro tipo para Bike
        Index. Asimismo, usted reconoce que podemos utilizar la Idea sin ninguna compensación
        adicional para usted, y/o divulgarla de forma no confidencial o a cualquier
        otra persona. Además, reconoce que, al aceptar su envío, Bike Index no renuncia
        a ningún derecho a utilizar ideas similares o relacionadas que ya conocía,
        que fueron desarrolladas por sus empleados o que obtuvo de fuentes distintas
        a usted.
      privacy_of_others: Privacidad de los demás
      privacy_of_others_p1_html: Usted declara a Bike Index que cumple con todas las
        leyes de privacidad aplicables, que ha obtenido todos los derechos y consentimientos
        necesarios conforme a la ley aplicable para divulgar a Bike Index, o permitir
        que Bike Index recopile, use, conserve y divulgue cualquier dato del Cliente
        que usted nos proporcione o nos autorice a recopilar. Usted es el único responsable
        de informar a sus Clientes que el acceso a nuestro servicio requerirá la aceptación
        de nuestros <a href="https://bikeindex.org/terms">Términos de Servicio</a>
        y <a href="https://bikeindex.org/privacy">Política de Privacidad.</a>
      privacy_of_others_p2_html: Si recibe información sobre otras personas, incluidos
        usuarios de Bike Index, a través del Servicio, debe mantenerla confidencial
        y utilizarla únicamente en relación con el Servicio. No podrá divulgar ni
        distribuir dicha información a terceros ni utilizarla con fines de marketing,
        a menos que cuente con el consentimiento expreso del usuario.
      privacy_of_others_p3_html: Jamás venderemos, intercambiaremos ni divulgaremos
        información sobre sus clientes. Si Bike Index es adquirida por otra organización,
        notificaremos a todos los usuarios a través de la dirección de correo electrónico
        principal registrada que su información se transferirá y podría estar sujeta
        a una política de privacidad diferente.
      privacy_of_others_p4_html: Los datos de clientes que haya recopilado antes de
        esta colaboración, pero que desee que Bike Index incorpore al Servicio, estarán
        protegidos por todos los términos enumerados en este Acuerdo.
      prohibited_businesses: Negocios prohibidos
      prohibited_businesses_p1: 'Al registrarse en el Servicio de Vendedor de Bike
        Index, usted confirma que no utilizará el Servicio para registrar bicicletas
        en relación con los siguientes negocios, actividades comerciales o prácticas
        comerciales: (1) vender bicicletas robadas a sabiendas, (2) robar bicicletas.'
      prohibited_businesses_p2: Al aceptar este Acuerdo, usted confirma que cumplirá
        con estos requisitos.
      references_to_relationship: Referencias a nuestra relación
      references_to_relationship_p1: Desde el momento en que acepte este Acuerdo con
        Bike Index hasta que cancele su cuenta con nosotros, usted acepta que podamos
        identificarlo como Proveedor de Bike Index. Ni usted ni nosotros insinuaremos
        ningún patrocinio, respaldo o afiliación falsa entre usted y Bike Index. Usted
        nos autoriza a publicar información sobre su negocio en nuestro sitio web,
        incluyendo, entre otros, su nombre, ubicación y número de teléfono.
      representation_and_warranties: Declaraciones y garantías
      representation_and_warranties_p1: 'Usted declara y garantiza a nosotros que:
        (a) usted es una persona física de al menos dieciocho (18) años de edad o,
        si es menor de dieciocho (18) años de edad, ha obtenido el consentimiento
        de su padre o tutor legal para la ejecución de este Acuerdo y el uso de los
        Servicios de Proveedor de Bike Index de la manera prescrita por Bike Index;
        (b) usted es elegible para registrarse y utilizar el Servicio y tiene el derecho,
        poder y capacidad para celebrar y cumplir con este Acuerdo; (c) el nombre
        identificado por usted cuando se registró es el nombre comercial bajo el cual
        vende bienes y servicios; (d) cualquier registro enviado por usted representará
        una venta de buena fe por su parte; (e) usted cumplirá con todas sus obligaciones
        con cada cliente para el cual envíe un registro y resolverá cualquier disputa
        o queja del Cliente directamente con el Cliente; (f) usted y todos los registros
        iniciados por usted cumplirán con todas las leyes, reglas y regulaciones federales,
        estatales y locales aplicables a su negocio, incluidas las leyes y regulaciones
        tributarias aplicables; (g) no utilizará el Servicio, directa o indirectamente,
        para ninguna actividad fraudulenta ni de ninguna manera que interfiera con
        el uso del Servicio.'
      restricted_use: Uso restringido
      restricted_use_p1: 'Usted está obligado a cumplir con todas las leyes, reglas
        y regulaciones aplicables a su uso del Servicio (por ejemplo, las que rigen
        la propiedad robada, la protección del consumidor, la competencia desleal,
        la no discriminación o la publicidad engañosa). Además de cualquier otro requisito
        o restricción establecido en este Acuerdo, usted acepta no hacer, ni permitir
        que ningún tercero haga, ninguna de las siguientes acciones: (i) acceder o
        intentar acceder a sistemas, programas o datos de Bike Index que no estén
        disponibles para uso público; (ii) permitir que cualquier tercero use y se
        beneficie del Servicio a través de un alquiler, arrendamiento, tiempo compartido,
        oficina de servicios u otro acuerdo; (iii) transferir cualquier derecho que
        se le haya otorgado en virtud de este Acuerdo; (iv) eludir cualquiera de las
        limitaciones técnicas del Servicio, usar cualquier herramienta para habilitar
        características o funcionalidades que de otro modo estén deshabilitadas en
        el Servicio, o descompilar, desensamblar o de cualquier otra manera aplicar
        ingeniería inversa al Servicio, excepto en la medida en que dicha restricción
        esté expresamente prohibida por la ley; (v) realizar o intentar realizar cualquier
        acción que interfiera con el correcto funcionamiento del Servicio, impida
        el acceso o uso del Servicio por parte de nuestros otros usuarios, o imponga
        una carga irrazonable o desproporcionadamente grande en nuestra infraestructura;
        o (vi) utilizar el Servicio de cualquier otra manera que no esté expresamente
        permitida en esta sección.'
      section_a: 'Sección A: El servicio de índice de bicicletas'
      section_c: 'Sección C: Registro para obtener el estatus de proveedor en Bike
        Index'
      section_d: 'Sección D: Terminación y otros asuntos legales'
      security: Seguridad
      security_body_html: Bike Index es responsable de proteger la seguridad de los
        datos de los clientes que obran en nuestro poder contra el acceso no autorizado
        y la pérdida o modificación accidental. Mantendremos procedimientos administrativos,
        técnicos y físicos comercialmente razonables para proteger toda la información
        personal sobre usted y sus clientes almacenada en nuestros servidores. Sin
        embargo, no podemos garantizar que terceros no autorizados nunca puedan burlar
        estas medidas o utilizar dicha información personal para fines indebidos.
        Usted reconoce que proporciona esta información personal sobre usted y sus
        clientes bajo su propio riesgo. Le recomendamos que revise nuestra <a href="https://bikeindex.org/privacy">Política
        de Privacidad</a> , que le ayudará a comprender cómo recopilamos, utilizamos
        y protegemos la información que nos proporciona.
      term: Término
      term_p1: El presente Acuerdo entrará en vigor en la fecha en que usted lo acepte
        (mediante la indicación electrónica de su aceptación) y permanecerá vigente
        mientras usted utilice el Servicio o hasta que Bike Index lo rescinda.
      termination: Terminación
      termination_and_other_legal_terms: Terminación y otros términos legales
      termination_p1: Usted puede rescindir este Acuerdo cerrando su cuenta de Bike
        Index en cualquier momento siguiendo las instrucciones en nuestro sitio web
        en el perfil de Cuenta de Proveedor de su organización. Nosotros podemos rescindir
        este Acuerdo y cerrar su Cuenta de Proveedor de Bike Index en cualquier momento
        por cualquier motivo, con efecto a partir de la notificación que le enviemos
        de conformidad con la Sección A10 (referencias a nuestras relaciones) anterior.
        Podemos suspender su cuenta de Bike Index y su acceso al Servicio, o rescindir
        este Acuerdo, si (i) determinamos a nuestra entera discreción que usted no
        es elegible para el Servicio por razones que incluyen, entre otras, quejas
        de clientes sobre su uso del servicio, o por cualquier otra razón; o (ii)
        usted no cumple con alguna de las disposiciones de este Acuerdo.
      terms_of_service_for_vendors: Condiciones de servicio para proveedores
      tos_agreement: Los Términos y Condiciones descritos aquí constituyen un "Acuerdo"
        legal entre el propietario único o la organización comercial que figura como
        "Vendedor" en la página de registro del Servicio (a veces denominado "usted",
        "su", "comerciante") y Bike Index, NFP. ("Bike Index").
      vendor_registration: Registro de proveedores
      vendor_registration_p1: El servicio de registro de bicicletas de Bike Index
        está disponible únicamente para personas que operan un negocio de venta de
        bienes o servicios, o que gestionan organizaciones relacionadas con el ciclismo.
        Para registrar bicicletas en Bike Index, primero deberá crear una cuenta de
        vendedor. Al registrarse, recopilaremos información básica como su nombre,
        nombre de la empresa, ubicación, dirección de correo electrónico y número
        de teléfono. Si aún no lo ha hecho, también deberá proporcionar una dirección
        de correo electrónico y una contraseña para su cuenta de Bike Index.
      vendor_registration_p2: Al registrarse como proveedor, deberá proporcionar información
        sobre el propietario o director de la empresa u organización, y deberá estar
        autorizado para actuar en su nombre y tener la facultad de vincularla a este
        Acuerdo. Para registrar una empresa y permitirle usar el Servicio, deberá
        aceptar este Acuerdo en nombre de la misma. Si lo acepta, el término "usted"
        se referirá tanto a usted, la persona física, como a la organización empresarial
        que representa.
      verification: Verificación
      verification_p1: Podemos solicitarle información para verificar su identidad,
        como su licencia de conducir u otra identificación oficial, o su licencia
        comercial. También podemos solicitarle permiso para realizar una inspección
        física en su lugar de trabajo y examinar las bicicletas relacionadas con el
        cumplimiento de este Acuerdo. Si no cumple con alguna de estas solicitudes
        en un plazo de cinco (5) días, su cuenta de Bike Index podría ser desactivada
        o cancelada. Usted nos autoriza a obtener información adicional sobre usted
        de terceros y otros servicios de identificación.
      verification_p2: Una vez que hayamos recopilado y verificado toda su información,
        Bike Index revisará su cuenta y determinará si cumple con los requisitos para
        usar el Servicio. Bike Index le notificará cuando su cuenta haya sido aprobada
        o no cumpla con los requisitos para usar el Servicio.
      verification_p3: Al aceptar los términos de este Acuerdo, nos autoriza a obtener
        información sobre usted a través de terceros, incluyendo mayoristas, distribuidores
        y otros proveedores de información del sector de la bicicleta. Usted reconoce
        que dicha información puede incluir su nombre, historial de direcciones, historial
        comercial y otros datos personales. Bike Index podrá actualizar periódicamente
        esta información para determinar si usted sigue cumpliendo con nuestros requisitos
        de elegibilidad.
      verification_p4: Usted acepta que Bike Index tiene permiso para contactarlo
        y compartir información sobre usted y su solicitud (incluyendo si es aprobada
        o rechazada), así como su uso de Bike Index con nuestros amigos.
      we_can_deactivate_html: 'Podemos desactivar tu capacidad para registrar nuevas
        bicicletas o rescindir este "Acuerdo" en cualquier momento (especialmente
        si haces algo malo). También puedes rescindirlo en cualquier momento. La rescisión
        es efectiva de inmediato. La rescisión no modifica tus bicicletas previamente
        registradas. Esta sección también incluye toda la información legal adicional
        que nos obligan a añadir (por ejemplo, indemnización, garantías, cesión).
        <a href="#section_d">Detalles completos</a>

        '
      we_provide_you_with_html: 'Le proporcionamos un servicio para registrar las
        bicicletas con las que interactúa; respetaremos y protegeremos su privacidad,
        datos e información personal, así como la de sus clientes. Usted gestiona
        su negocio, atiende a sus clientes y cumple con todas las leyes, normas y
        reglamentos. <a href="#section_a">Detalles completos</a>

        '
      welcome_to_bike_index_html: '<strong>Bienvenidos a Bike Index</strong> , una
        organización sin fines de lucro 501(c)(3). Hemos desarrollado un servicio
        de registro de bicicletas de acceso público (el "Servicio") que permite a
        las organizaciones registradas en Bike Index ("Proveedores", "usted") registrar
        bicicletas de forma rápida y sencilla para sus "Clientes" (usuarios de sus
        servicios) mediante "Cuentas" de Proveedor. Creemos que este servicio previene
        el robo de bicicletas y ayuda a los Clientes a recuperar las bicicletas robadas.

        '
      with_the_following_brief_descriptions: Con las siguientes breves descripciones
        de las partes de este "Acuerdo", intentamos explicar los aspectos más importantes
        de nuestro Servicio. Sin embargo, el documento completo contiene detalles
        significativos que hacen que valga la pena leerlo.
      your_liability: Su responsabilidad
      your_liability_p1: Usted es responsable de todas las reclamaciones, multas,
        tasas, sanciones y demás responsabilidades derivadas de su incumplimiento
        de este Acuerdo o de su uso del Servicio. Bike Index tendrá la potestad de
        decisión final respecto a las reclamaciones. Usted deberá reembolsar a Bike
        Index su responsabilidad. No recibirá ningún reembolso de las tasas abonadas
        a Bike Index.
      your_liability_p2: Sin limitar lo anterior, usted acepta defender, indemnizar
        y mantener indemne a Bike Index y a sus respectivos empleados y agentes (colectivamente
        "Entidades Exoneradas") de y contra cualquier reclamo, demanda, requerimiento,
        pérdida, responsabilidad, daño, acción o procedimiento que surja de o esté
        relacionado con (i) su incumplimiento de cualquier disposición de este Acuerdo,
        y/o (ii) su uso del Servicio, incluyendo sin limitación cualquier reversión,
        reclamo, multa, tarifa, sanción y honorarios de abogados; (iii) su negligencia
        o mala conducta intencional, o la de su empleado o agente; o (iv) obligaciones
        de indemnización de terceros en las que incurramos como resultado directo
        o indirecto de sus actos u omisiones.
      your_privacy: Su privacidad
      your_privacy_body_html: Su privacidad y la protección de sus datos son muy importantes
        para nosotros. Usted reconoce haber recibido, leído íntegramente y estar de
        acuerdo con los términos de nuestra <a href="https://bikeindex.org/privacy">Política
        de Privacidad,</a> la cual está vinculada e incorporada a este Acuerdo por
        referencia. Dicha Política contiene su consentimiento para la recopilación,
        el uso, la conservación y la divulgación de su información personal, así como
        otros asuntos allí establecidos, y explica cómo y con qué fines recopilamos,
        usamos, conservamos, divulgamos y protegemos la información que usted nos
        proporciona.
