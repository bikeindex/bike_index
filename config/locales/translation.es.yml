      serial_numbers_public: Hacemos públicos los números de serie porque es la mejor
        manera de recuperar bicicletas robadas y disuadir el robo.
      similar_serials: Si hay alguna bicicleta con números de serie similares, sobre
        todo si solo los últimos dígitos son diferentes, lo más probable es que tu
        bicicleta sea de esa marca y modelo.
      the_faster_and_easier_it_is: Cuanto más rápido y fácil sea acceder a los números
        de serie, más bicicletas robadas recuperaremos. Restringir el acceso a los
        números de serie solo beneficia a los ladrones.
      this_isnt_optimistic_speculation: 'Esto no es una especulación optimista: lo
        hemos demostrado y seguimos haciéndolo con cada bicicleta robada que recuperamos.'
      to_learn_more_html: Para obtener más información, consulta %{article_link} sobre
        privacidad.
      verification_questions: Cualquier duda sobre la verificación se resuelve revisando
        la información de registro. Esto no ha supuesto ningún problema.
      visit_or_add_html: Primero, %{add_link}. Una vez que hayas hecho eso, te mostraremos
        una lista de verificación de lo que debes hacer para aumentar tus posibilidades
        de recuperación.
      we_care_about_your_privacy: Nos importa tu privacidad más que a nadie; puedes
        ocultar tu registro para que solo tú lo veas. Simplemente no creemos que sea
        una buena idea.
      we_offer_bike_shops: Ofrecemos a las tiendas de bicicletas y a las fuerzas del
        orden una interfaz fácil de usar para buscar cualquier bicicleta sospechosa
        que encuentren, y una forma de contactar rápidamente con el propietario legítimo.
      we_recommend_searching: Por ahora, le recomendamos buscar el número de serie
        de su bicicleta. Le mostraremos las bicicletas registradas que tengan números
        de serie similares.
      we_successfully_recover: Mediante este proceso, recuperamos con éxito bicicletas
        robadas cada semana.
      weve_recovered_bikes: Hemos recuperado bicicletas incluso antes de que pudieran
        ser marcadas como robadas porque se podían encontrar en el Índice.
      what_about_my_privacy: "¿Qué pasa con mi privacidad?"
      what_if_i_sell_my_bike: "¿Qué pasa si vendo mi bicicleta?"
      while_serial_numbers: Si bien los números de serie y la información de las bicicletas
        son públicos, no existe ningún vínculo entre los usuarios y las bicicletas
        que poseen. Nunca compartimos información de los usuarios a menos que ellos
        mismos lo autoricen explícitamente.
      who_can_register_bikes: "¿Quién puede matricular bicicletas?"
      why_public: "¿Por qué son públicos los números de serie y la información sobre
        las bicicletas que no han sido robadas?"
      your_personal_information_is_never_viewed: Su información personal nunca será
        vista, compartida ni vendida sin su permiso.
