default: &default
  adapter: postgresql
  # manually set db_pool, separate from threads, because sidekiq
  pool: <%= ENV.fetch("DB_POOL") { 20 } %>

default_local: &default_local
  <<: *default
  port: <%= ENV.fetch("PGPORT", 5432) %>
  <% if ENV["CI"] %>
  host: 127.0.0.1
  username: rails
  password: password
  <% else %>
  host: <%= ENV.fetch("PGHOST", "localhost") %>
  username: <%= ENV["PGUSER"] %>
  password: <%= ENV["PGPASSWORD"] %>
  <% end %>

development:
  primary:
    <<: *default_local
    database: bikeindex_development<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %>
  primary_replica:
    <<: *default_local
    # Using primary database, replica not actually replicating
    database: bikeindex_development<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %>
    replica: true
  analytics:
    <<: *default_local
    database: bikeindex_analytics_development<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %>
    migrations_paths: db/analytics_migrate
  cache:
    <<: *default_local
    database: bikeindex_cache_development<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %>
    migrations_paths: db/cache_migrate


# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  primary:
    <<: *default_local
    database: bikeindex_test<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %><%= ENV["TEST_ENV_NUMBER"] %>
  primary_replica:
    <<: *default_local
    # Using primary database, replica not actually replicating
    database: bikeindex_test<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %><%= ENV["TEST_ENV_NUMBER"] %>
    replica: true
  analytics:
    <<: *default_local
    database: bikeindex_analytics_test<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %><%= ENV["TEST_ENV_NUMBER"] %>
    migrations_paths: db/analytics_migrate
  cache:
    <<: *default_local
    database: bikeindex_cache_test<%= "_#{ENV["WORKSPACE_ID"]}" if ENV["WORKSPACE_ID"] %><%= ENV["TEST_ENV_NUMBER"] %>
    migrations_paths: db/cache_migrate

production:
  primary:
    <<: *default
    database: bike_index_production
    host: "<%= ENV['POSTGRESQL_ADDRESS'] %>"
    username: "<%= ENV['POSTGRESQL_USERNAME'] %>"
    password: "<%= ENV['POSTGRESQL_PASSWORD'] %>"

  primary_replica:
    <<: *default
    replica: true
    host: "<%= ENV['POSTGRESQL_PRIMARY_REPLICA_ADDRESS'] %>"
    database: "<%= ENV['POSTGRESQL_DATABASE'] %>"
    username: "<%= ENV['POSTGRESQL_USERNAME'] %>"
    password: "<%= ENV['POSTGRESQL_PASSWORD'] %>"
    variables:
      statement_timeout: 60000

  analytics:
    <<: *default
    migrations_paths: db/analytics_migrate
    host: "<%= ENV['POSTGRESQL_ANALYTICS_ADDRESS'] %>"
    database: "<%= ENV['ANALYTICS_DB_DATABASE'] %>"
    username: "<%= ENV['ANALYTICS_DB_USERNAME'] %>"
    password: "<%= ENV['ANALYTICS_DB_PASSWORD'] %>"
    port: "<%= ENV['ANALYTICS_DB_PORT'] %>"

  cache:
    <<: *default
    migrations_paths: db/cache_migrate
    host: "<%= ENV.fetch('POSTGRESQL_CACHE_ADDRESS') { ENV['POSTGRESQL_ADDRESS'] } %>"
    database: "<%= ENV.fetch('CACHE_DB_DATABASE') { 'bike_index_cache_production' } %>"
    username: "<%= ENV.fetch('CACHE_DB_USERNAME') { ENV['POSTGRESQL_USERNAME'] } %>"
    password: "<%= ENV.fetch('CACHE_DB_PASSWORD') { ENV['POSTGRESQL_PASSWORD'] } %>"
