development:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") %>
  channel_prefix: bikeindex_<%= ENV.fetch("WORKSPACE_ID", "development") %>

test:
  adapter: async

production:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") %>
  channel_prefix: bikeindex_production

staging:
  adapter: redis
  url: <%= ENV.fetch("REDIS_URL") %>
  channel_prefix: bikeindex_staging
