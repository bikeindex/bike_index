# Kamal config for PR review apps.
#
# Usage (called from .github/workflows/review-app.yml and from bin/review-app):
#
#   export REVIEW_APP_PR_NUMBER=123
#   export REVIEW_APP_HOST=review.bikeindex.org
#   export IMAGE_TAG=pr-123-<sha>
#   kamal deploy --config-file config/deploy.review.yml
#
# Multi-tenancy: each PR uses a unique `service:` name, so containers coexist on
# the same host. kamal-proxy routes by Host header. The wildcard cert is mounted
# from the host into the proxy container.
#
# This file is NOT used by production (Cloud66). It exists solely for review apps.

<% pr      = ENV.fetch("REVIEW_APP_PR_NUMBER") %>
<% host    = ENV.fetch("REVIEW_APP_HOST") %>
<% tag     = ENV.fetch("IMAGE_TAG") %>
<% slug    = "pr-#{pr}" %>
<% appname = "bike-index-#{slug}" %>

service: <%= appname %>
image: ghcr.io/bikeindex/bike_index

servers:
  web:
    hosts:
      - <%= host %>
    labels:
      review-app: "<%= slug %>"
  worker:
    hosts:
      - <%= host %>
    cmd: bundle exec sidekiq -c 2
    labels:
      review-app: "<%= slug %>"

registry:
  server: ghcr.io
  username:
    - KAMAL_REGISTRY_USERNAME
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64
  # CI builds and pushes the image; Kamal pulls by tag.
  context: "."

# Pin the tag CI built so each PR deploys its exact SHA.
# Kamal uses this when the `image:` doesn't include a tag.
image_tag: <%= tag %>

proxy:
  ssl: true
  host: <%= slug %>.review.bikeindex.org
  app_port: 3000
  # Use the operator-supplied wildcard cert instead of auto-LE per hostname.
  # Paths are inside the kamal-proxy container; the host directory is mounted
  # via the `volumes:` block on the proxy below. Verify these option names against
  # your installed Kamal version during one-time setup — older Kamal 2.x used
  # `ssl_certificate_path` / `ssl_certificate_key_path`, newer releases may differ.
  ssl_certificate_path: /etc/ssl/review.bikeindex.org/fullchain.pem
  ssl_certificate_key_path: /etc/ssl/review.bikeindex.org/privkey.pem
  healthcheck:
    path: /up
    interval: 5
    timeout: 60

# Mount the wildcard cert into the kamal-proxy container.
# kamal-proxy is a global accessory in Kamal 2.x; this stanza ensures the
# host directory is available inside it. Confirm syntax against installed Kamal version.
proxy_volumes:
  - "/etc/ssl/review.bikeindex.org:/etc/ssl/review.bikeindex.org:ro"

env:
  clear:
    RAILS_ENV: production
    RAILS_LOG_TO_STDOUT: "1"
    RAILS_SERVE_STATIC_FILES: "1"
    REVIEW_APP: "1"
    REVIEW_APP_PR_NUMBER: "<%= pr %>"
    BASE_URL: "https://<%= slug %>.review.bikeindex.org"
    POSTGRESQL_ADDRESS: bike-index-review-postgres
    POSTGRESQL_USERNAME: bikeindex
    POSTGRESQL_DATABASE: bike_index_review_<%= slug.tr("-", "_") %>_primary
    POSTGRESQL_PRIMARY_REPLICA_ADDRESS: bike-index-review-postgres
    ANALYTICS_DB_DATABASE: bike_index_review_<%= slug.tr("-", "_") %>_analytics
    ANALYTICS_DB_USERNAME: bikeindex
    ANALYTICS_DB_PORT: "5432"
    # Per-PR Redis logical DB number is set by bin/review-app at deploy time
    # and passed in via the REVIEW_APP_REDIS_DB env var (see workflow).
    REDIS_URL: "redis://bike-index-review-redis:6379/<%= ENV.fetch('REVIEW_APP_REDIS_DB', '1') %>"
    REDIS_CACHE_URL: "redis://bike-index-review-redis:6379/<%= ENV.fetch('REVIEW_APP_REDIS_DB', '1') %>"
    REDIS_RACK_ATTACK_URL: "redis://bike-index-review-redis:6379/<%= ENV.fetch('REVIEW_APP_REDIS_DB', '1') %>"
    WEB_CONCURRENCY: "1"
    RAILS_MAX_THREADS: "3"
    DB_POOL: "5"
  secret:
    - SECRET_KEY_BASE
    - VERIFICATION_SECRET
    - SESSION_SECRET
    - POSTGRESQL_PASSWORD
    - ANALYTICS_DB_PASSWORD
    # External services — sandbox or stubbed values; see .github/workflows/review-app.yml
    - STRIPE_PUBLISHABLE_KEY
    - STRIPE_SECRET_KEY
    - STRIPE_WEBHOOK_SECRET
    - POSTMARK_API_TOKEN
    - GOOGLE_MAPS
    - GOOGLE_MAPS_STATIC
    - GOOGLE_GEOCODER
    - MAPBOX_GEOCODER
    - MAPBOX_MAPPING
    - R2_ENDPOINT
    - R2_ACCESS_KEY
    - R2_ACCESS_KEY_SECRET
    - CLOUDFLARE_TOKEN
    - HONEYBADGER_API_KEY

accessories:
  postgres:
    image: postgres:16
    host: <%= host %>
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_USER: bikeindex
        POSTGRES_DB: bikeindex
      secret:
        - POSTGRES_PASSWORD
    directories:
      - data:/var/lib/postgresql/data
    options:
      restart: always
  redis:
    image: redis:7
    host: <%= host %>
    port: "127.0.0.1:6379:6379"
    cmd: "redis-server --databases 32 --maxmemory 512mb --maxmemory-policy allkeys-lru"
    directories:
      - data:/data
    options:
      restart: always

# Run rails commands on a per-PR container. Used by bin/review-app to run
# db:schema:load / db:seed on first deploy and db:migrate on subsequent deploys.
servers_web_options:
  ulimit: "nofile=65536:65536"
