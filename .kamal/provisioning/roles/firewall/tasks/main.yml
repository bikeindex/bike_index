---
- name: Configure ufw defaults
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - direction: incoming
      policy: deny
    - direction: outgoing
      policy: allow

- name: Configure ufw rules
  community.general.ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
  loop:
    # 'allow', not 'limit': ufw's `limit` drops an IP past 6 SSH conns/30s, which
    # a Kamal deploy exceeds — broke the workflow's ssh-keyscan. SSH is key-only.
    - rule: 'allow'
      port: '22'
      proto: 'tcp'
    - rule: 'allow'
      port: '80'
      proto: 'tcp'
    - rule: 'allow'
      port: '443'
      proto: 'tcp'

# Drop the old `limit` rule on pre-existing hosts; UFW matches it first and
# would shadow the `allow` above. No-op once gone.
- name: Remove legacy rate-limited SSH rule
  community.general.ufw:
    rule: 'limit'
    port: '22'
    proto: 'tcp'
    delete: true

- name: Enable ufw
  community.general.ufw:
    state: enabled
