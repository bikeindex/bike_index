name: Strava Search CI

on:
  pull_request:

defaults:
  run:
    working-directory: vendor/strava_search

jobs:
  changes:
    name: Check for strava_search changes, trigger run of strava_search CI if there are
    runs-on: ubuntu-latest
    outputs:
      strava_search: ${{ steps.filter.outputs.strava_search }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            strava_search:
              - 'vendor/strava_search/**'
              - 'public/strava_search/**'
              - '.github/workflows/strava_search_ci.yml'

  lint:
    name: Lint
    needs: [changes]
    if: needs.changes.outputs.strava_search == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run linting
        run: npm run lint

      - name: Check for credentials
        run: npm run check-credentials

  typecheck:
    name: Type Check
    needs: [changes]
    if: needs.changes.outputs.strava_search == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

  test:
    name: Test
    needs: [changes]
    if: needs.changes.outputs.strava_search == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:run

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [changes, lint, typecheck, test]
    if: needs.changes.outputs.strava_search == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build application
        run: npm run build

      - name: Verify public build assets are up to date
        working-directory: .
        run: diff -r vendor/strava_search/dist/assets public/strava_search/assets
