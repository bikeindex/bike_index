name: Strava Search CI

# Dispatched by ci.yml's "Dispatch" job when files under vendor/strava_search/,
# public/strava_search/, or this workflow change (vs the merge-base with main —
# keep ci.yml's path regex in sync when adding paths here). No `pull_request`
# trigger: the old always-on paths-filter job put one passed + one skipped
# check run on every PR even when nothing strava-related changed.

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: vendor/strava_search

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for credentials
        run: npm run check-credentials

      - name: Run linting
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build

      - name: Verify public build assets are up to date
        working-directory: .
        run: diff -r vendor/strava_search/dist/assets public/strava_search/assets
