name: Strava Search CI

# Runs only when strava_search files change, via the native `paths:` trigger
# filter — the filtering happens before a run is created, so PRs that don't
# touch these paths get no run and no check at all. Approaches that didn't
# work, for the record:
#   - an always-on dorny/paths-filter job: one passed + one skipped check on
#     every PR, even with no strava changes
#   - dispatching from ci.yml via workflow_dispatch: runs fine and attaches to
#     the commit, but workflow_dispatch check suites never appear in the PR's
#     check rollup, so the check was invisible where it matters
# NOTE: don't make this a required status check in branch protection —
# paths-filtered workflows create no run on non-matching PRs, which would
# leave the required check "expected" forever.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'vendor/strava_search/**'
      - 'public/strava_search/**'
      - '.github/workflows/strava_search_ci.yml'

defaults:
  run:
    working-directory: vendor/strava_search

jobs:
  ci:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.tool-versions'
          cache: 'npm'
          cache-dependency-path: 'vendor/strava_search/package-lock.json'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Check for credentials
        run: npm run check-credentials

      - name: Run linting
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Build application
        run: npm run build

      - name: Verify public build assets are up to date
        working-directory: .
        run: diff -r vendor/strava_search/dist/assets public/strava_search/assets
