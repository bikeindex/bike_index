name: Staging

# Deploys / destroys the persistent staging app via Kamal.
# See docs/staging.md for one-time host setup.
#
# Triggers:
#   - workflow_dispatch : operator clicks "Run workflow" in Actions UI

on:
  workflow_dispatch:
    inputs:
      action:
        description: "deploy or destroy"
        required: true
        type: choice
        default: deploy
        options: [deploy, destroy]
      ref:
        description: "Branch or SHA to deploy (defaults to main)"
        required: false
        type: string
        default: main

permissions:
  contents: read
  packages: write       # push to GHCR

concurrency:
  # One in-flight staging operation at a time.
  group: staging
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build image
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Compute image tag
        id: tag
        run: echo "image_tag=staging-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging

  deploy:
    name: Deploy staging
    needs: build
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    environment: staging
    # All env vars on the deploy step feed `.kamal/secrets-ci` via Dotenv variable
    # substitution. Kamal substitutes `$POSTGRES_PASSWORD` etc. from the calling
    # process env at deploy time.
    env: &deploy_env
      STAGING_HOST: ${{ vars.STAGING_HOST }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
      SECRET_KEY_BASE: ${{ secrets.STAGING_SECRET_KEY_BASE }}
      SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET }}
      VERIFICATION_SECRET: ${{ secrets.STAGING_VERIFICATION_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
      POSTMARK_API_TOKEN: ${{ secrets.STAGING_POSTMARK_API_TOKEN }}
      GOOGLE_MAPS: ${{ secrets.STAGING_GOOGLE_MAPS }}
      GOOGLE_MAPS_STATIC: ${{ secrets.STAGING_GOOGLE_MAPS_STATIC }}
      GOOGLE_GEOCODER: ${{ secrets.STAGING_GOOGLE_GEOCODER }}
      MAPBOX_GEOCODER: ${{ secrets.STAGING_MAPBOX_GEOCODER }}
      MAPBOX_MAPPING: ${{ secrets.STAGING_MAPBOX_MAPPING }}
      R2_ENDPOINT: ${{ secrets.STAGING_R2_ENDPOINT }}
      R2_ACCESS_KEY: ${{ secrets.STAGING_R2_ACCESS_KEY }}
      R2_ACCESS_KEY_SECRET: ${{ secrets.STAGING_R2_ACCESS_KEY_SECRET }}
      CLOUDFLARE_TOKEN: ${{ secrets.STAGING_CLOUDFLARE_TOKEN }}
      HONEYBADGER_API_KEY: ${{ secrets.STAGING_HONEYBADGER_API_KEY }}
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"
      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - name: Trust staging host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Stage CI secrets file
        run: cp .kamal/secrets-ci .kamal/secrets
      - name: Deploy
        run: bin/staging deploy "${{ needs.build.outputs.image_tag }}"

  destroy:
    name: Destroy staging
    if: github.event.inputs.action == 'destroy'
    runs-on: ubuntu-latest
    environment: staging
    env:
      # Same secret bundle as deploy — secrets-ci references them at substitution
      # time even though `app remove` doesn't need most of them.
      STAGING_HOST: ${{ vars.STAGING_HOST }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.STAGING_POSTGRES_PASSWORD }}
      SECRET_KEY_BASE: ${{ secrets.STAGING_SECRET_KEY_BASE }}
      SESSION_SECRET: ${{ secrets.STAGING_SESSION_SECRET }}
      VERIFICATION_SECRET: ${{ secrets.STAGING_VERIFICATION_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.STAGING_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STAGING_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STAGING_STRIPE_WEBHOOK_SECRET }}
      POSTMARK_API_TOKEN: ${{ secrets.STAGING_POSTMARK_API_TOKEN }}
      GOOGLE_MAPS: ${{ secrets.STAGING_GOOGLE_MAPS }}
      GOOGLE_MAPS_STATIC: ${{ secrets.STAGING_GOOGLE_MAPS_STATIC }}
      GOOGLE_GEOCODER: ${{ secrets.STAGING_GOOGLE_GEOCODER }}
      MAPBOX_GEOCODER: ${{ secrets.STAGING_MAPBOX_GEOCODER }}
      MAPBOX_MAPPING: ${{ secrets.STAGING_MAPBOX_MAPPING }}
      R2_ENDPOINT: ${{ secrets.STAGING_R2_ENDPOINT }}
      R2_ACCESS_KEY: ${{ secrets.STAGING_R2_ACCESS_KEY }}
      R2_ACCESS_KEY_SECRET: ${{ secrets.STAGING_R2_ACCESS_KEY_SECRET }}
      CLOUDFLARE_TOKEN: ${{ secrets.STAGING_CLOUDFLARE_TOKEN }}
      HONEYBADGER_API_KEY: ${{ secrets.STAGING_HONEYBADGER_API_KEY }}
      IMAGE_TAG: "destroy"
    steps:
      - name: Checkout requested ref
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"
      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}
      - name: Trust staging host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.STAGING_HOST }} >> ~/.ssh/known_hosts
      - name: Stage CI secrets file
        run: cp .kamal/secrets-ci .kamal/secrets
      - name: Destroy
        run: bin/staging destroy
