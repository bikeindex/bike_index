name: CI

on:
  push:
  # Allows bin/check_translations to trigger CI on the translations-sync branch.
  # Pushes made with the default GITHUB_TOKEN don't fire `on: push`, so the
  # automated translations PR otherwise gets no checks.
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  pull-requests: write

jobs:
  # Fires follow-on workflows from CI's single `on: push` run instead of giving
  # each one its own `pull_request` trigger full of conditionally-skipped jobs:
  #   - review-app.yml used `synchronize` + a label gate — 3 skipped check runs
  #     on every push to every unlabeled PR
  #   - strava_search_ci.yml ran a paths-filter job on every PR — one passed +
  #     one skipped check even when nothing strava-related changed
  # GITHUB_TOKEN can't fire event-driven triggers, but explicit
  # workflow_dispatch API calls are allowed (`actions: write` above).
  dispatch:
    name: "Dispatch - review app deploy & strava_search CI"
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      # Auto-redeploy the review app for PRs carrying the 'review-app' label.
      - name: Dispatch review-app deploy (labeled PRs only)
        run: |
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$GITHUB_REF_NAME" \
            --state open --label review-app --json number --jq '.[0].number')
          if [ -n "$pr" ]; then
            echo "Dispatching review-app deploy for PR #$pr"
            gh workflow run review-app.yml --repo "$GITHUB_REPOSITORY" \
              --ref "$GITHUB_REF_NAME" -f pr_number="$pr" -f action=deploy
          fi
      # The compare API diffs against the merge-base with main (three-dot
      # semantics), so no checkout is needed. Caveat: it returns at most 300
      # changed files — a mega-branch whose strava files fall past that cap
      # would miss the dispatch. Skipped on main: strava CI never ran there
      # before either (its old trigger was pull_request-only).
      - name: Dispatch strava_search CI (when its files changed)
        if: github.ref_name != 'main'
        run: |
          changed=$(gh api "repos/$GITHUB_REPOSITORY/compare/main...$GITHUB_SHA" \
            --jq '.files[].filename')
          if echo "$changed" | grep -qE '^(vendor/strava_search/|public/strava_search/|\.github/workflows/strava_search_ci\.yml$)'; then
            echo "strava_search files changed; dispatching Strava Search CI"
            gh workflow run strava_search_ci.yml --repo "$GITHUB_REPOSITORY" \
              --ref "$GITHUB_REF_NAME"
          fi

  lint_and_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle install

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          cache: 'npm'
      - run: npm install

      - name: Lint Ruby code with standard
        run: bundle exec standardrb --no-fix
      - name: Lint Ruby code with rubocops
        run: bundle exec rubocop -c .rubocop_custom.yml
      - name: Lint JavaScript code
        if: success() || failure()
        run: npm run js:lint_check
      - name: Lint HTML code
        if: success() || failure()
        run: npm run html:lint_check
      - name: Check HTML formatting
        if: success() || failure()
        run: npm run html:format_check

      - name: Scan for common Rails security vulnerabilities using static analysis
        if: success() || failure()
        run: bin/brakeman

      # Eventually this should be added:
      # - name: Scan for security vulnerabilities in JavaScript dependencies
      #   run: bin/importmap audit
  test:
    name: "Run tests"
    runs-on: ubuntu-latest
    services:
      # Service images pull from AWS's public Docker Hub mirror — direct pulls
      # from registry-1.docker.io intermittently time out on Actions runners
      # (3 retries, then the job fails at "Initialize containers").
      postgres:
        image: public.ecr.aws/docker/library/postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: rails
          POSTGRES_PASSWORD: password
        # needed because the postgres container does not provide a healthcheck
        # tmpfs makes DB faster by using RAM
        #
        # health-interval 1s, not 10s: docker runs the FIRST check only after the
        # interval elapses, so 10s meant every job idled ~10s+ waiting on a database
        # that was ready in ~3s. pg_isready is cheap enough to poll every second.
        # `-h 127.0.0.1` forces TCP — the entrypoint's temporary initdb-phase server
        # listens only on the unix socket, so a plain pg_isready reports ready
        # before the real server is up.
        options: >-
          --mount type=tmpfs,destination=/var/lib/postgresql/data
          --health-cmd "pg_isready -h 127.0.0.1"
          --health-interval 1s
          --health-retries 60
      redis:
        # 7-alpine: pinned to match the review-app host's redis:7 accessory, and
        # the alpine variant is a much smaller pull than debian-based latest.
        image: public.ecr.aws/docker/library/redis:7-alpine
        ports:
          - 6379:6379
        options: --entrypoint redis-server
    strategy:
      fail-fast: false
      matrix:
        ci_node_total: [5]
        ci_node_index: [0, 1, 2, 3, 4]
    env:
      REDIS_URL: redis://localhost:6379
      RAILS_ENV: test
      TZ: "America/Chicago"
      COVERAGE: false # additional configuration is needed for parallelized tests
      CC_TEST_REPORTER_ID: 04daa6564351115dc1515504790cd379ad8dc25e7778f0641e0f8c63185f887c
      TRANSLATION_BRANCH: main
      RETRY_FLAKY: true
      KNAPSACK_PRO_TEST_SUITE_TOKEN_RSPEC: ${{ secrets.KNAPSACK_PRO_TEST_SUITE_TOKEN_RSPEC }}
      KNAPSACK_PRO_CI_NODE_TOTAL: ${{ matrix.ci_node_total }}
      KNAPSACK_PRO_CI_NODE_INDEX: ${{ matrix.ci_node_index }}
      KNAPSACK_PRO_LOG_LEVEL: warn
      # Capybara binds to this port in `:js` specs (spec/support/capybara.rb).
      # Set explicitly so the assets:precompile step below can bake a matching
      # ENV['BASE_URL'] into any ERB-templated asset.
      CAPYBARA_PORT: 5042
    steps:
      - name: Get CPU cores
        id: cpu-info
        run: echo "cpu-cores=$(nproc)" >> $GITHUB_OUTPUT
      # install system dependencies. libfuse2t64 is for setup-imagemagick's
      # AppImage below — installing it here (cached) instead of letting the
      # action apt-get it uncached saves ~4s per job, which is why this step
      # runs first.
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: google-chrome-stable curl gettext libfuse2t64 libvips libcurl4-gnutls-dev libexpat1-dev libssl-dev libz-dev postgresql-client ripgrep
          version: 1.3
      # install imagemagick separately, cache-apt-pkgs-action wasn't installing correctly
      - uses: mfinelli/setup-imagemagick@v6
        with:
          cache: true
          install-libfuse2: false
      - name: Ensure ImageMagick is available
        run: echo $(identify --version)
      - name: Checkout code
        uses: actions/checkout@v6
      # Install Ruby dependencies
      - name: Install Ruby and gems
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - run: bundle install
      - name: Set up database
        run: bin/rails db:create db:schema:load:primary db:schema:load:analytics db:migrate
      - name: Sync translations (only on main by default)
        if: matrix.ci_node_index == 1
        env:
          GH_TOKEN: ${{ github.token }}
        run: bin/check_translations ${{ secrets.TRANSLATION_IO_API_KEY }}
      # Cache compiled assets + sprockets' incremental cache.
      # Key hashes every input the three asset tools read:
      #   - sprockets: app/assets/images, javascripts, config/manifest.js, Gemfile.lock (gem versions)
      #   - dartsass-rails: app/assets/stylesheets, config/initializers/dartsass.rb
      #   - tailwindcss-rails: app/assets/tailwind, config/tailwind.config.js,
      #     and everything tailwind scans (views/components/helpers/javascript)
      # On a partial-key restore, sprockets' tmp/cache makes the rebuild near-instant
      # for unchanged inputs, so the loose restore-keys fallback is worth keeping.
      #
      # Split into restore/save: all matrix jobs restore, but only ci_node_index == 0
      # writes the cache. With the combined actions/cache@v4 action, parallel jobs race
      # on reserveCache and *all* of them lose ("another job may be creating this cache"),
      # so the cache never gets populated.
      - name: Restore precompiled assets cache
        id: assets-cache
        uses: actions/cache/restore@v5
        with:
          path: |
            tmp/cache/assets
            app/assets/builds
            public/assets
          # CAPYBARA_PORT is in the key because the precompile step bakes
          # `ENV['BASE_URL']` (derived from it) into ERB-templated assets;
          # a cached bundle from a different port would serve a stale URL.
          key: ${{ runner.os }}-assets-port${{ env.CAPYBARA_PORT }}-${{ hashFiles('app/assets/**', 'app/views/**', 'app/components/**', 'app/helpers/**/*.rb', 'app/javascript/**', 'config/tailwind.config.js', 'config/initializers/dartsass.rb', 'config/initializers/assets.rb', 'Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-assets-port${{ env.CAPYBARA_PORT }}-
      - name: build assets
        if: steps.assets-cache.outputs.cache-hit != 'true'
        # BASE_URL must match the host:port that Capybara binds to in tests
        # so any ERB-baked asset URL resolves to the same host the browser
        # will hit (see spec/support/capybara.rb).
        env:
          BASE_URL: http://localhost:${{ env.CAPYBARA_PORT }}
        run: bin/rails assets:precompile --trace
      - name: Save precompiled assets cache
        if: matrix.ci_node_index == 0 && steps.assets-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            tmp/cache/assets
            app/assets/builds
            public/assets
          key: ${{ steps.assets-cache.outputs.cache-primary-key }}
      # Test bin/setup (verifies e.g. seeds work) - only run on 1 node, knapsack should balance
      # Done after asset compilation and caching to save time on that
      - name: Test bin/setup
        if: matrix.ci_node_index == 0
        run: bin/setup
      # Run tests
      - name: Run tests
        env:
          SKIP_CSS_BUILD: true
        run: bin/knapsack_pro_tests
      # Until parallel reporting is set up, skip sending code coverage reports
      # - name: publish code coverage
      #   uses: paambaati/codeclimate-action@v9.0.0
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ env.KNAPSACK_PRO_CI_NODE_INDEX }}
          path: tmp/rspec-${{ env.KNAPSACK_PRO_CI_NODE_INDEX }}.xml

  # Commenting out for now - it doesn't work for forked pull requests,
  # Which means forked PRs always fail
