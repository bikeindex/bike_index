name: Review App

# Deploys / destroys per-PR review apps via Kamal to the shared review host.
# See docs/review-apps.md for one-time host setup.
#
# Triggers:
#   - workflow_dispatch    : operator clicks "Run workflow" in Actions UI
#   - pull_request closed  : auto-destroy if the 'review-app' label is set
#   - pull_request sync    : auto-redeploy on every push if the 'review-app' label
#                            is set AND the PR is from this repo (not a fork)
#
# For fork PRs, the 'pull_request' events are intentionally gated by the same-repo
# check below — forks must be deployed manually via workflow_dispatch by a maintainer
# who has reviewed the diff.

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string
      action:
        description: "deploy or destroy"
        required: true
        type: choice
        default: deploy
        options: [deploy, destroy]
  pull_request:
    types: [synchronize, closed]

permissions:
  contents: read
  packages: write       # push to GHCR
  pull-requests: write  # add/remove labels and comment

concurrency:
  # One in-flight deploy per PR.
  group: review-app-${{ github.event.inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  REVIEW_LABEL: review-app

jobs:
  resolve:
    name: Resolve PR
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.set.outputs.pr_number }}
      head_sha:  ${{ steps.set.outputs.head_sha }}
      action:    ${{ steps.set.outputs.action }}
      proceed:   ${{ steps.set.outputs.proceed }}
    steps:
      - name: Resolve PR + action from the trigger
        id: set
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PR: ${{ github.event.inputs.pr_number }}
          INPUT_ACTION: ${{ github.event.inputs.action }}
          PR_NUMBER_EVENT: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA_EVENT: ${{ github.event.pull_request.head.sha }}
          PR_HEAD_REPO_EVENT: ${{ github.event.pull_request.head.repo.full_name }}
          PR_ACTION_EVENT: ${{ github.event.action }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            pr="$INPUT_PR"
            action="$INPUT_ACTION"
            head_sha=$(gh pr view "$pr" --repo "$REPO" --json headRefOid -q .headRefOid)
            proceed=true
          else
            pr="$PR_NUMBER_EVENT"
            head_sha="$PR_HEAD_SHA_EVENT"
            if [[ "$PR_ACTION_EVENT" == "closed" ]]; then
              action="destroy"
            else
              action="deploy"
            fi
            has_label=$(echo "$PR_LABELS_JSON" | jq -r 'index("'"$REVIEW_LABEL"'")' || true)
            if [[ "$has_label" == "null" || -z "$has_label" ]]; then
              echo "PR #$pr lacks the '$REVIEW_LABEL' label; skipping."
              proceed=false
            elif [[ "$PR_HEAD_REPO_EVENT" != "$REPO" ]]; then
              echo "PR #$pr is from a fork ($PR_HEAD_REPO_EVENT); skipping auto-trigger."
              proceed=false
            else
              proceed=true
            fi
          fi
          echo "pr_number=$pr"   >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "action=$action"  >> "$GITHUB_OUTPUT"
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"

  # Deploy and destroy deliberately share ONE job, branching via step-level `if:`
  # on the resolved action. Keep it that way: GitHub renders one check-run per
  # job, so splitting this into separate deploy/destroy jobs makes every commit
  # show one running + one skipped check. See docs/review-apps.md "How a deploy works".
  update:
    name: Update ${{ needs.resolve.outputs.pr_number }}
    needs: resolve
    if: needs.resolve.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment: review-app
    # All env vars feed `.kamal/secrets-ci` via Dotenv variable substitution. Kamal
    # substitutes `$POSTGRES_PASSWORD` etc. from the calling process env. Destroy
    # needs the same bundle even though `app remove` uses little of it — avoids
    # silent empty-string substitutions causing odd failures.
    env:
      REVIEW_APP_HOST: ${{ vars.REVIEW_APP_HOST }}
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      POSTGRES_PASSWORD: ${{ secrets.REVIEW_APP_POSTGRES_PASSWORD }}
      SECRET_KEY_BASE: ${{ secrets.REVIEW_APP_SECRET_KEY_BASE }}
      SESSION_SECRET: ${{ secrets.REVIEW_APP_SESSION_SECRET }}
      VERIFICATION_SECRET: ${{ secrets.REVIEW_APP_VERIFICATION_SECRET }}
      STRIPE_PUBLISHABLE_KEY: ${{ secrets.REVIEW_APP_STRIPE_PUBLISHABLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.REVIEW_APP_STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.REVIEW_APP_STRIPE_WEBHOOK_SECRET }}
      GOOGLE_MAPS: ${{ secrets.REVIEW_APP_GOOGLE_MAPS }}
      GOOGLE_MAPS_STATIC: ${{ secrets.REVIEW_APP_GOOGLE_MAPS_STATIC }}
      GOOGLE_GEOCODER: ${{ secrets.REVIEW_APP_GOOGLE_GEOCODER }}
      MAPBOX_GEOCODER: ${{ secrets.REVIEW_APP_MAPBOX_GEOCODER }}
      MAPBOX_MAPPING: ${{ secrets.REVIEW_APP_MAPBOX_MAPPING }}
      R2_DEV_ENDPOINT: ${{ secrets.REVIEW_APP_R2_DEV_ENDPOINT }}
      R2_DEV_ACCESS_KEY: ${{ secrets.REVIEW_APP_R2_DEV_ACCESS_KEY }}
      R2_DEV_ACCESS_KEY_SECRET: ${{ secrets.REVIEW_APP_R2_DEV_ACCESS_KEY_SECRET }}
      HONEYBADGER_API_KEY: ${{ secrets.REVIEW_APP_HONEYBADGER_API_KEY }}
      # Used by the destroy path's ERB; deploy passes the real tag as a CLI arg.
      IMAGE_TAG: "destroy"
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.resolve.outputs.head_sha }}
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.2"
      - name: Install Kamal
        run: gem install kamal -v "~> 2.0"
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.REVIEW_APP_SSH_KEY }}
      - name: Trust review host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ vars.REVIEW_APP_HOST }} >> ~/.ssh/known_hosts
      - name: Stage CI secrets file
        run: cp .kamal/secrets-ci .kamal/secrets

      # --- deploy path: build + push the image, then deploy ---
      - name: Compute image tag
        if: needs.resolve.outputs.action == 'deploy'
        id: tag
        run: echo "image_tag=pr-${{ needs.resolve.outputs.pr_number }}-${{ needs.resolve.outputs.head_sha }}" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        if: needs.resolve.outputs.action == 'deploy'
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        if: needs.resolve.outputs.action == 'deploy'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push image
        if: needs.resolve.outputs.action == 'deploy'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.image_tag }}
          cache-from: type=gha,scope=review-app
          cache-to: type=gha,mode=max,scope=review-app
      - name: Deploy
        if: needs.resolve.outputs.action == 'deploy'
        run: bin/review-app deploy "${{ needs.resolve.outputs.pr_number }}" "${{ steps.tag.outputs.image_tag }}"
      - name: Add review-app label
        if: needs.resolve.outputs.action == 'deploy'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ needs.resolve.outputs.pr_number }}" --add-label "$REVIEW_LABEL" || true
      - name: Comment URL on PR
        if: needs.resolve.outputs.action == 'deploy'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url="https://pr-${{ needs.resolve.outputs.pr_number }}.review.bikeindex.org"
          body=":rocket: Review app deployed at $url"
          gh pr comment "${{ needs.resolve.outputs.pr_number }}" --body "$body" || true

      - name: Destroy
        if: needs.resolve.outputs.action == 'destroy'
        run: bin/review-app destroy "${{ needs.resolve.outputs.pr_number }}"
      - name: Remove review-app label
        if: needs.resolve.outputs.action == 'destroy'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr edit "${{ needs.resolve.outputs.pr_number }}" --remove-label "$REVIEW_LABEL" || true
